<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #ffffff; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* Security Controls */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        input, textarea, .select-text { -webkit-user-select: text !important; user-select: text !important; }

        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .grid-icon { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 1.4rem; transition: 0.2s; }
        .grid-icon:active { transform: scale(0.9); }

        /* Smooth Page Transitions */
        .page-active { display: block !important; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PIN Input Style */
        .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #ddd; display: inline-block; margin: 0 5px; }
        .pin-dot.filled { background: var(--nagad-red); border-color: var(--nagad-red); }
    </style>
</head>
<body>

    <!-- PIN SECURITY SCREEN -->
    <div id="pin-screen" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center p-8">
        <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="w-20 mb-6" alt="Lock">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">BattleArena Admin</h2>
        <p class="text-gray-400 text-sm mb-10">প্রবেশ করতে আপনার গোপন পিন দিন</p>
        
        <div class="mb-10 flex gap-3">
            <input type="password" id="admin-pin" maxlength="8" placeholder="••••••" 
                class="w-full bg-gray-50 p-5 rounded-3xl text-center text-3xl tracking-[15px] border-2 border-gray-100 focus:border-red-500 outline-none transition-all shadow-inner">
        </div>

        <button onclick="verifyAccess()" class="w-full max-w-xs nagad-gradient text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition uppercase tracking-widest">
            Access Dashboard
        </button>
        <p id="pin-error" class="text-red-500 text-xs mt-4 hidden">ভুল পিন! আবার চেষ্টা করুন।</p>
    </div>

    <!-- MAIN DASHBOARD APP -->
    <div id="app-body" class="hidden min-h-screen pb-28">
        
        <!-- Header Section (Nagad Style) -->
        <header class="nagad-gradient p-6 pb-28 text-white sticky top-0 z-50 rounded-b-[45px] card-shadow">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-xl font-bold border border-white/30 shadow-lg">Y</div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight">Yasin Admin</h2>
                        <p class="text-[10px] opacity-80 uppercase tracking-widest font-bold">Master Control Center</p>
                    </div>
                </div>
                <button onclick="exitAdmin()" class="bg-white/10 w-10 h-10 rounded-full flex items-center justify-center border border-white/20 active:bg-red-700">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>

            <!-- Dashboard Realtime Stats -->
            <div class="grid grid-cols-2 gap-4 mt-10">
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-[30px] border border-white/10 shadow-sm">
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">Today Income</p>
                    <h3 class="text-2xl font-bold italic font-sans text-yellow-300">৳ <span id="stat-income">0.00</span></h3>
                </div>
                <div class="bg-white/10 backdrop-blur-md p-5 rounded-[30px] border border-white/10 shadow-sm">
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">Total Users</p>
                    <h3 class="text-2xl font-bold italic font-sans" id="stat-users">0</h3>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="px-5 -mt-16 relative z-[60]">
            
            <!-- HOME GRID (Nagad Style) -->
            <div id="home-tab" class="page-content bg-white rounded-[35px] p-8 card-shadow grid grid-cols-3 gap-y-10 gap-x-4 text-center mb-8">
                <div onclick="showPage('matches')" class="flex flex-col items-center">
                    <div class="grid-icon bg-red-50 text-red-600"><i class="fas fa-trophy"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">টুর্নামেন্ট</span>
                </div>
                <div onclick="showPage('players')" class="flex flex-col items-center">
                    <div class="grid-icon bg-blue-50 text-blue-600"><i class="fas fa-user-friends"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">প্লেয়ার</span>
                </div>
                <div onclick="showPage('verify')" class="flex flex-col items-center relative">
                    <div class="grid-icon bg-green-50 text-green-600"><i class="fas fa-check-double"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">ভেরিফাই</span>
                    <span id="badge-count" class="hidden absolute top-0 right-2 bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div onclick="showPage('banners')" class="flex flex-col items-center">
                    <div class="grid-icon bg-orange-50 text-orange-600"><i class="fas fa-images"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">ব্যানার</span>
                </div>
                <div onclick="showPage('results')" class="flex flex-col items-center">
                    <div class="grid-icon bg-purple-50 text-purple-600"><i class="fas fa-poll-h"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">রেজাল্ট</span>
                </div>
                <div onclick="showPage('tools')" class="flex flex-col items-center">
                    <div class="grid-icon bg-gray-50 text-gray-600"><i class="fas fa-shield-alt"></i></div>
                    <span class="text-[11px] font-bold text-gray-600">সিকিউরিটি</span>
                </div>
            </div>

            <!-- PAGE: TOURNAMENT MANAGEMENT -->
            <div id="page-matches" class="hidden page-content">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="font-bold text-gray-800 text-lg">ম্যাচ কন্ট্রোল</h3>
                    <button onclick="document.getElementById('modal-match').style.display='flex'" class="bg-red-600 text-white px-5 py-2 rounded-2xl text-xs font-bold shadow-lg">+ নতুন ম্যাচ</button>
                </div>
                <div id="render-matches" class="space-y-4"></div>
            </div>

            <!-- PAGE: PAYMENT VERIFICATION -->
            <div id="page-verify" class="hidden page-content">
                <h3 class="font-bold text-gray-800 text-lg mb-4">পেমেন্ট রিকোয়েস্ট</h3>
                <div id="render-verify" class="space-y-4"></div>
            </div>

            <!-- PAGE: BANNER MANAGEMENT -->
            <div id="page-banners" class="hidden page-content">
                <div class="bg-white p-6 rounded-[35px] card-shadow mb-6">
                    <h3 class="font-bold text-gray-800 mb-4 uppercase text-sm tracking-widest">Slider Banner Setup</h3>
                    <input type="text" id="banner-input" placeholder="Image URL (Link)" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text mb-4 border border-gray-100">
                    <button onclick="uploadBanner()" class="w-full nagad-gradient text-white py-3 rounded-2xl font-bold shadow-lg">ব্যানার যুক্ত করুন</button>
                </div>
                <div id="render-banners" class="flex gap-3 overflow-x-auto pb-4"></div>
            </div>

            <!-- PAGE: PLAYER MANAGEMENT -->
            <div id="page-players" class="hidden page-content">
                <input type="text" id="player-search" onkeyup="searchPlayers()" placeholder="সার্চ প্লেয়ার (নাম বা আইডি...)" class="w-full bg-white p-4 rounded-[25px] card-shadow outline-none mb-6 select-text">
                <div id="render-players" class="space-y-3"></div>
            </div>

        </main>

        <!-- Bottom Tab Bar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[100] rounded-t-[40px] shadow-[0_-5px_25px_rgba(0,0,0,0.05)]">
            <button onclick="showPage('home')" id="btn-home" class="flex flex-col items-center text-red-600 transition">
                <i class="fas fa-home text-xl"></i><span class="text-[10px] mt-1 font-bold">হোম</span>
            </button>
            <button onclick="showPage('matches')" id="btn-matches" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-gamepad text-xl"></i><span class="text-[10px] mt-1 font-bold">ম্যাচ</span>
            </button>
            <button onclick="showPage('verify')" id="btn-verify" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-check-circle text-xl"></i><span class="text-[10px] mt-1 font-bold">ভেরিফাই</span>
            </button>
            <button onclick="exitAdmin()" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-sign-out-alt text-xl"></i><span class="text-[10px] mt-1 font-bold">লগআউট</span>
            </button>
        </nav>
    </div>

    <!-- MODAL: ADD MATCH -->
    <div id="modal-match" class="fixed inset-0 bg-black/60 z-[2000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center text-red-600 uppercase">Setup Tournament</h3>
            <form id="match-form" class="space-y-4">
                <input type="text" name="title" placeholder="Match Title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text font-bold border border-gray-100" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" name="fee" placeholder="Entry Fee ৳" class="bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100" required>
                    <input type="number" name="prize" placeholder="Prize ৳" class="bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select name="map" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border border-gray-100"><option value="Bermuda">Bermuda</option><option value="Purgatory">Purgatory</option></select>
                    <select name="type" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border border-gray-100"><option value="Solo">Solo</option><option value="Squad">Squad</option></select>
                </div>
                <input type="text" name="time" placeholder="Match Time (e.g. 9:00 PM)" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100" required>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="document.getElementById('modal-match').style.display='none'" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-500">বাতিল</button>
                    <button type="submit" class="flex-[2] nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">পাবলিশ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security
        const ADMIN_PIN = "yasin999";

        window.verifyAccess = () => {
            const input = document.getElementById('admin-pin').value;
            if(input === ADMIN_PIN) {
                localStorage.setItem('battle_pro_auth', 'true');
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('app-body').classList.remove('hidden');
                initEngine();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('admin-pin').value = '';
            }
        };

        // Auto-login Check
        if(localStorage.getItem('battle_pro_auth') === 'true') {
            document.getElementById('pin-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            window.addEventListener('load', initEngine);
        }

        window.exitAdmin = () => {
            localStorage.removeItem('battle_pro_auth');
            location.reload();
        };

        // Tab Switcher
        window.showPage = (pageId) => {
            const pages = ['home', 'matches', 'players', 'verify', 'banners'];
            pages.forEach(p => { if(document.getElementById('page-'+p)) document.getElementById('page-'+p).classList.add('hidden'); });
            document.getElementById('home-tab').classList.add('hidden');
            
            if(pageId === 'home') document.getElementById('home-tab').classList.remove('hidden');
            else document.getElementById('page-'+pageId).classList.add('page-active');

            // Nav Highlight
            const navs = ['home', 'matches', 'verify'];
            navs.forEach(n => document.getElementById('btn-'+n).classList.replace('text-red-600', 'text-gray-400'));
            if(navs.includes(pageId)) document.getElementById('btn-'+pageId).classList.replace('text-gray-400', 'text-red-600');
        };

        // Initialization
        function initEngine() {
            loadStats();
            loadMatches();
            loadVerify();
            loadPlayers();
            loadBanners();
        }

        function loadStats() {
            onSnapshot(collection(db, "users"), snap => document.getElementById('stat-users').innerText = snap.size);
            onSnapshot(query(collection(db, "registrations"), where("status", "==", "approved")), snap => {
                let total = 0; snap.forEach(d => total += Number(d.data().fee || 0));
                document.getElementById('stat-income').innerText = total.toFixed(2);
            });
        }

        // Matches
        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                title: e.target.title.value, fee: e.target.fee.value, prize: e.target.prize.value,
                time: e.target.time.value, map: e.target.map.value, type: e.target.type.value,
                status: 'open', roomID: '', roomPass: '', createdAt: new Date().getTime()
            };
            await addDoc(collection(db, "matches"), data);
            document.getElementById('modal-match').style.display='none';
            e.target.reset();
        };

        function loadMatches() {
            const list = document.getElementById('render-matches');
            onSnapshot(query(collection(db, "matches"), orderBy("createdAt", "desc")), snap => {
                list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-[30px] card-shadow border-l-[10px] border-red-500 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-gray-800 uppercase text-sm">${m.title}</h4>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${m.time} | ৳${m.fee}</p>
                                <div class="mt-3 flex gap-2">
                                    <button onclick="setRoom('${d.id}')" class="bg-red-50 text-red-600 text-[10px] px-3 py-1.5 rounded-xl font-bold border border-red-100">ROOM ID</button>
                                    <button onclick="deleteDocById('matches', '${d.id}')" class="bg-gray-50 text-gray-400 text-[10px] px-3 py-1.5 rounded-xl font-bold border border-gray-100">DELETE</button>
                                </div>
                            </div>
                            <span class="bg-green-100 text-green-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase">${m.status}</span>
                        </div>`;
                });
            });
        }

        window.setRoom = async (id) => {
            const rid = prompt("Room ID দিন:");
            const rps = prompt("Password দিন:");
            if(rid && rps) await updateDoc(doc(db, "matches", id), { roomID: rid, roomPass: rps, status: 'live' });
        };

        // Payment Verification
        function loadVerify() {
            const list = document.getElementById('render-verify');
            const badge = document.getElementById('badge-count');
            onSnapshot(query(collection(db, "registrations"), where("status", "==", "pending")), snap => {
                list.innerHTML = '';
                badge.innerText = snap.size;
                if(snap.size > 0) badge.classList.remove('hidden'); else badge.classList.add('hidden');
                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-[35px] card-shadow border-l-[10px] border-orange-500">
                            <div class="flex justify-between items-start mb-4">
                                <div><h4 class="font-bold text-gray-800 uppercase">${r.playerName}</h4><p class="text-xs text-orange-600 font-bold">TrxID: ${r.trxID}</p></div>
                                <div class="text-right text-xs font-black">৳${r.fee || 0}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="verifyPay('${d.id}')" class="flex-1 nagad-gradient text-white py-3 rounded-2xl font-bold text-xs shadow-md">APPROVE</button>
                                <button onclick="deleteDocById('registrations', '${d.id}')" class="flex-1 bg-gray-100 text-gray-400 py-3 rounded-2xl font-bold text-xs">REJECT</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.verifyPay = async (id) => await updateDoc(doc(db, "registrations", id), { status: 'approved' });

        // Players & Banners
        window.uploadBanner = async () => {
            const url = document.getElementById('banner-input').value;
            if(url) { await addDoc(collection(db, "banners"), { url, createdAt: new Date() }); document.getElementById('banner-input').value=''; }
        };

        function loadBanners() {
            const list = document.getElementById('render-banners');
            onSnapshot(collection(db, "banners"), snap => {
                list.innerHTML = '';
                snap.forEach(d => {
                    list.innerHTML += `
                        <div class="relative flex-shrink-0">
                            <img src="${d.data().url}" class="w-44 h-28 object-cover rounded-[25px] shadow-md border-2 border-white">
                            <button onclick="deleteDocById('banners', '${d.id}')" class="absolute -top-2 -right-1 bg-red-600 text-white w-7 h-7 rounded-full shadow-lg border-2 border-white text-xs">×</button>
                        </div>`;
                });
            });
        }

        function loadPlayers() {
            onSnapshot(collection(db, "users"), snap => {
                window.allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderUsers(window.allUsers);
            });
        }

        function renderUsers(users) {
            const list = document.getElementById('render-players'); list.innerHTML = '';
            users.forEach(u => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-[25px] card-shadow flex items-center gap-4 border border-gray-50">
                        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-400 text-lg uppercase">${u.name?u.name[0]:'?'}</div>
                        <div class="flex-1"><h4 class="text-sm font-bold text-gray-800">${u.name || 'User'}</h4><p class="text-[10px] text-gray-400 font-bold">${u.email}</p></div>
                        <button onclick="deleteDocById('users', '${u.id}')" class="text-red-300 active:text-red-600 px-3"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
        }

        window.deleteDocById = async (col, id) => { if(confirm("Are you sure?")) await deleteDoc(doc(db, col, id)); };

    </script>
</body>
    </html>
