<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena - Master Owner Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; }
        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .menu-icon-box { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: #fff; border: 1px solid #f1f5f9; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .menu-item:active { transform: scale(0.9); }
        .tab-page { display: none; padding-bottom: 100px; }
        .active-tab { display: block !important; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { position: fixed; inset: 0; background: white; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--nagad-red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader"><div class="ring"></div><p class="mt-4 font-bold text-red-600">সার্ভারের সাথে যুক্ত হচ্ছে...</p></div>

    <div id="app-body" class="min-h-screen">
        <header class="nagad-gradient p-6 pb-28 text-white rounded-b-[50px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center font-bold border border-white/30">Y</div>
                    <div>
                        <h2 class="font-black text-xl leading-tight uppercase">Yasin Ar-Rayan</h2>
                        <p class="text-[10px] text-yellow-300 font-black uppercase tracking-widest italic">System Admin</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-white/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-white/10 active:bg-red-800 transition"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-10">
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70 mb-1">মোট ইউজার</p>
                    <h3 id="stat-users" class="text-xl font-bold">0</h3>
                </div>
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70 mb-1">মোট আয়</p>
                    <h3 id="stat-money" class="text-xl font-bold">৳ 0.00</h3>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-16 relative z-10">
            <div id="tab-home" class="tab-page active-tab bg-white rounded-[40px] p-8 card-shadow border border-gray-50">
                <div class="menu-grid">
                    <div onclick="switchPage('matches')" class="menu-item"><div class="menu-icon-box text-red-600"><i class="fas fa-trophy"></i></div><span class="text-[11px] font-bold">ম্যাচ</span></div>
                    <div onclick="switchPage('wallet')" class="menu-item"><div class="menu-icon-box text-blue-600"><i class="fas fa-wallet"></i></div><span class="text-[11px] font-bold">ওয়ালেট</span></div>
                    <div onclick="switchPage('support')" class="menu-item"><div class="menu-icon-box text-green-600"><i class="fas fa-headset"></i></div><span class="text-[11px] font-bold">সাপোর্ট</span></div>
                    <div onclick="switchPage('settings')" class="menu-item"><div class="menu-icon-box text-gray-600"><i class="fas fa-cog"></i></div><span class="text-[11px] font-bold">সেটিংস</span></div>
                    <div onclick="switchPage('notify')" class="menu-item"><div class="menu-icon-box text-yellow-500"><i class="fas fa-bullhorn"></i></div><span class="text-[11px] font-bold">নোটিশ</span></div>
                    <div onclick="switchPage('verify')" class="menu-item"><div class="menu-icon-box text-orange-600"><i class="fas fa-check-double"></i></div><span class="text-[11px] font-bold">ভেরিফাই</span></div>
                </div>
            </div>

            <div id="tab-matches" class="tab-page">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800 text-lg uppercase italic">ম্যাচ ম্যানেজমেন্ট</h3>
                    <button onclick="openModal('modal-add')" class="bg-red-600 text-white px-5 py-2.5 rounded-2xl text-xs font-bold shadow-lg">+ তৈরি করুন</button>
                </div>
                <div id="match-list" class="space-y-4"></div>
            </div>

            <div id="tab-wallet" class="tab-page">
                <h3 class="font-bold text-gray-800 text-lg mb-4 uppercase">টাকা জমা দেওয়ার রিকোয়েস্ট</h3>
                <div id="wallet-list" class="space-y-4"></div>
            </div>

            <div id="tab-settings" class="tab-page">
                <div class="bg-white p-7 rounded-[40px] card-shadow border border-gray-100 space-y-4">
                    <h3 class="font-bold text-gray-800 uppercase text-center border-b pb-3">পেমেন্ট মেথড সেটআপ</h3>
                    <input type="text" id="set-nagad" placeholder="Nagad Number" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none font-bold">
                    <input type="text" id="set-bkash" placeholder="Bkash Number" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none font-bold">
                    <button onclick="saveSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase tracking-widest">সেভ করুন</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-[2000] rounded-t-[40px] shadow-2xl">
            <button onclick="switchPage('home')" class="flex flex-col items-center text-red-600 font-bold"><i class="fas fa-home text-xl"></i><span class="text-[9px]">HOME</span></button>
            <button onclick="switchPage('matches')" class="flex flex-col items-center text-gray-300 font-bold"><i class="fas fa-trophy text-xl"></i><span class="text-[9px]">MATCHES</span></button>
            <button onclick="switchPage('settings')" class="flex flex-col items-center text-gray-300 font-bold"><i class="fas fa-cog text-xl"></i><span class="text-[9px]">CONFIG</span></button>
        </nav>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 backdrop-blur-sm z-[10000]">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center text-red-600 uppercase italic">নতুন ম্যাচ পাবলিশ</h3>
            <form id="match-form" class="space-y-4">
                <input type="text" name="title" placeholder="ম্যাচের নাম (e.g. Solo Match)" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none font-bold" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" name="fee" placeholder="এন্ট্রি ফি" class="bg-gray-50 p-4 rounded-2xl border outline-none" required>
                    <input type="number" name="prize" placeholder="পুরস্কার" class="bg-gray-50 p-4 rounded-2xl border outline-none" required>
                </div>
                <input type="text" name="time" placeholder="সময় (e.g. 10:00 PM)" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none" required>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('modal-add')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-400">বাদ দিন</button>
                    <button type="submit" class="flex-[2] nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase">পাবলিশ</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // লোডার হ্যান্ডলিং
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1500);
            startEngine();
        });

        // পেজ পরিবর্তন
        window.switchPage = (id) => {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab'));
            document.getElementById('tab-'+id).classList.add('active-tab');
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        function startEngine() {
            // ১. ইউজার ডাটা কানেক্ট করা
            onSnapshot(collection(db, "users"), s => {
                document.getElementById('stat-users').innerText = s.size;
            });

            // ২. ইনকাম ক্যালকুলেট করা
            onSnapshot(collection(db, "registrations"), s => {
                let cash = 0;
                s.forEach(d => { if(d.data().status === 'approved') cash += Number(d.data().fee || 0); });
                document.getElementById('stat-money').innerText = "৳ " + cash.toFixed(2);
            });

            // ৩. ম্যাচ লিস্ট সরাসরি ডাটাবেজ থেকে আনা
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('match-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-[35px] shadow-sm border-l-[12px] border-red-600 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm uppercase">${m.title}</h4>
                                <p class="text-[10px] font-bold text-blue-600 mt-1 uppercase">Fee: ৳${m.fee} | Prize: ৳${m.prize}</p>
                            </div>
                            <button onclick="delMatch('${d.id}')" class="bg-gray-50 text-gray-400 p-3 rounded-2xl"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            });

            // ৪. ওয়ালেট রিকোয়েস্ট কানেকশন
            onSnapshot(collection(db, "wallet_requests"), snap => {
                const list = document.getElementById('wallet-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status === 'pending') {
                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-[30px] shadow-md border-l-[10px] border-blue-500">
                                <h4 class="font-bold text-xs uppercase">${r.email}</h4>
                                <p class="text-sm font-black text-red-600 mt-1">Amount: ৳${r.amount}</p>
                                <div class="mt-4 flex gap-2">
                                    <button onclick="approveWallet('${d.id}', '${r.uid}', ${r.amount})" class="flex-1 nagad-gradient text-white py-2 rounded-xl font-bold text-[10px]">APPROVE</button>
                                    <button onclick="rejectRequest('${d.id}')" class="flex-1 bg-gray-100 text-gray-400 py-2 rounded-xl font-bold text-[10px]">REJECT</button>
                                </div>
                            </div>
                        `;
                    }
                });
            });
        }

        // নতুন ম্যাচ পাবলিশ ফাংশন
        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            try {
                await addDoc(collection(db, "matches"), {
                    title: f.title.value,
                    fee: f.fee.value,
                    prize: f.prize.value,
                    time: f.time.value,
                    status: 'open',
                    createdAt: new Date().getTime()
                });
                alert("ম্যাচ সফলভাবে পাবলিশ হয়েছে!");
                closeModal('modal-add');
                f.reset();
            } catch (err) { alert("Error: " + err.message); }
        };

        window.delMatch = async (id) => {
            if(confirm("ম্যাচটি ডিলিট করতে চান?")) await deleteDoc(doc(db, "matches", id));
        };

        window.approveWallet = async (docId, uid, amount) => {
            const uRef = doc(db, "users", uid);
            const uSnap = await getDoc(uRef);
            if(uSnap.exists()) {
                let bal = Number(uSnap.data().balance || 0);
                await updateDoc(uRef, { balance: bal + Number(amount) });
                await updateDoc(doc(db, "wallet_requests", docId), { status: 'approved' });
                alert("ইউজারের ব্যালেন্স আপডেট হয়েছে!");
            }
        };

        window.rejectRequest = async (id) => {
            await deleteDoc(doc(db, "wallet_requests", id));
        };

        window.saveSettings = async () => {
            const n = document.getElementById('set-nagad').value;
            const b = document.getElementById('set-bkash').value;
            await setDoc(doc(db, "app_settings", "config"), { nagad: n, bkash: b }, { merge: true });
            alert("সেটিংস সেভ হয়েছে!");
        };

    </script>
</body>
                    </html>
