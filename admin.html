<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nagad-gradient { background: linear-gradient(45deg, #ed1c24, #f7941d); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="login-page" class="fixed inset-0 bg-white flex flex-col items-center justify-center p-6 z-50">
        <img src="https://i.ibb.co/LhYnZpG/logo.png" class="w-32 mb-6">
        <h2 class="text-2xl font-black text-red-600 uppercase italic mb-8">Admin Access</h2>
        <input type="email" id="login-email" placeholder="Admin Email" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-4 outline-none font-bold">
        <input type="password" id="login-pin" placeholder="Enter PIN" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-6 outline-none font-bold text-center tracking-widest">
        <button onclick="login()" class="w-full max-w-xs nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Login System</button>
        <div id="login-page" class="fixed inset-0 bg-white flex flex-col items-center justify-center p-6 z-50">
        <img src="https://i.ibb.co/LhYnZpG/logo.png" class="w-32 mb-6">
        <h2 class="text-2xl font-black text-red-600 uppercase italic mb-8 tracking-tighter">Admin Control</h2>
        
        <input type="hidden" id="login-email" value="yasin@gmail.com"> 
        
        <div class="w-full max-w-xs relative">
            <input type="password" id="login-pin" placeholder="ENTER 6-DIGIT PIN" 
                class="w-full p-5 bg-gray-100 rounded-[30px] outline-none font-black text-center tracking-[15px] text-2xl border-2 border-transparent focus:border-red-500 transition-all">
        </div>
        
        <button onclick="login()" class="w-full max-w-xs nagad-gradient text-white py-5 rounded-[30px] font-black shadow-lg uppercase mt-6 tracking-widest active:scale-95 transition-transform">
            Access Dashboard
        </button>
        <p class="mt-6 text-[10px] font-bold text-gray-400 uppercase italic">Battle Arena Secure Encryption</p>
    </div>

    <div id="admin-dashboard" class="hidden pb-24">
        <div class="nagad-gradient p-8 rounded-b-[50px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest text-white">Administrator</p>
                    <h1 class="text-2xl font-black italic uppercase">Yasin Ar-Rayan</h1>
                </div>
                <button onclick="logout()" class="bg-white/20 p-4 rounded-2xl backdrop-blur-md"><i class="fas fa-power-off"></i></button>
            </div>
        </div>

        <div class="p-5 space-y-6">
            <div class="bg-white p-6 rounded-[40px] card-shadow border border-gray-100">
                <h3 class="font-black text-gray-800 uppercase italic mb-6 flex items-center gap-2">
                    <i class="fas fa-wallet text-red-500"></i> Payment Setup
                </h3>
                <div class="space-y-4">
                    <input id="set-nagad" placeholder="Nagad Number" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                    <input id="set-bkash" placeholder="bKash Number" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold">
                    <button onclick="saveAppSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold uppercase shadow-md">Update Numbers</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[40px] card-shadow border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-gray-800 uppercase italic flex items-center gap-2">
                        <i class="fas fa-trophy text-red-500"></i> Matches
                    </h3>
                    <button onclick="openModal('modal-add')" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Add Match</button>
                </div>
                <div id="match-list" class="space-y-4"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center">
             <i class="fas fa-home text-red-500 text-xl"></i>
             <div id="support-badge" class="bg-red-600 text-white text-[10px] px-2 rounded-full hidden">0</div>
             <i class="fas fa-user-shield text-gray-300 text-xl"></i>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end">
        <div class="bg-white rounded-t-[50px] p-8">
            <h3 class="text-center font-black text-red-600 uppercase mb-6">New Tournament</h3>
            <form id="match-form" class="space-y-4">
                <input name="title" placeholder="Title" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input name="fee" placeholder="Fee" class="p-4 bg-gray-100 rounded-2xl font-bold">
                    <input name="prize" placeholder="Prize" class="p-4 bg-gray-100 rounded-2xl font-bold">
                </div>
                <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold uppercase">Publish</button>
                <button type="button" onclick="closeModal('modal-add')" class="w-full text-gray-400 font-bold uppercase text-xs">Close</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs-XXXXXXXXXXXX", // আপনার API Key
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.appspot.com",
            messagingSenderId: "XXXXXXXX",
            appId: "XXXXXXXX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        window.login = async () => {
            const email = document.getElementById('login-email').value; // ফিক্সড ইমেইল অটো নিবে
            const pin = document.getElementById('login-pin').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pin); 
            } catch(e) { 
                alert("ভুল পিন দিয়েছেন! ফায়ারবেসে চেক করুন।"); 
            }
        };

        window.logout = () => signOut(auth);

        function syncData() {
            onSnapshot(collection(db, "matches"), s => {
                const list = document.getElementById('match-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="bg-gray-50 p-4 rounded-3xl flex justify-between items-center border border-gray-100">
                        <div>
                            <p class="font-black text-gray-800 uppercase text-sm">${m.title}</p>
                            <p class="text-[10px] font-bold text-red-500 uppercase">Fee: ৳${m.fee}</p>
                        </div>
                        <button onclick="delMatch('${d.id}')" class="text-gray-300 px-3"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                });
            });
        }

        window.saveAppSettings = async () => {
            await setDoc(doc(db, "app_settings", "config"), {
                nagad: document.getElementById('set-nagad').value,
                bkash: document.getElementById('set-bkash').value
            }, { merge: true });
            alert("Updated!");
        };

        window.delMatch = async (id) => { if(confirm("মুছে ফেলবেন?")) await deleteDoc(doc(db, "matches", id)); };

        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            await addDoc(collection(db, "matches"), {
                title: f.title.value, fee: f.fee.value, prize: f.prize.value,
                createdAt: new Date().getTime()
            });
            alert("Match Added!"); closeModal('modal-add'); f.reset();
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
