<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleArena Pro Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f7f8fa; }
        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-red-600 flex items-center justify-center z-[9999]">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl w-85 text-center">
            <h2 class="text-2xl font-bold text-red-600 mb-6 uppercase italic">Owner Verification</h2>
            <p class="text-sm text-gray-500 mb-6">আপনার রেজিস্টার্ড জিমেইল দিয়ে লগইন করুন</p>
            <button id="login-btn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 py-4 rounded-2xl font-bold shadow-sm hover:bg-gray-50">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                Login with Google
            </button>
        </div>
    </div>

    <div id="admin-ui" class="hidden">
        <header class="nagad-gradient p-6 pb-20 text-white rounded-b-[50px] shadow-xl">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-xl uppercase italic">Yasin Ar-Rayan</h2>
                <button id="logout-btn" class="bg-white/20 p-2 rounded-xl"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-white/10 p-5 rounded-3xl text-center border border-white/20">
                    <p class="text-[10px] uppercase opacity-70">মোট ইউজার</p>
                    <h3 id="stat-users" class="text-xl font-bold">0</h3>
                </div>
                <div class="bg-white/10 p-5 rounded-3xl text-center border border-white/20">
                    <p class="text-[10px] uppercase opacity-70">মোট আয়</p>
                    <h3 id="stat-money" class="text-xl font-bold">৳ 0.00</h3>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-10 pb-24">
            <div class="bg-white rounded-[40px] p-8 shadow-xl grid grid-cols-3 gap-6 mb-6">
                <div onclick="showPage('m')" class="flex flex-col items-center"><i class="fas fa-trophy text-red-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">ম্যাচ</span></div>
                <div onclick="showPage('w')" class="flex flex-col items-center"><i class="fas fa-wallet text-blue-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">ওয়ালেট</span></div>
                <div onclick="showPage('s')" class="flex flex-col items-center"><i class="fas fa-headset text-green-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">সেবা</span></div>
            </div>

            <div id="page-m" class="page active">
                <div class="bg-white p-7 rounded-[40px] shadow-md border">
                    <h3 class="font-bold text-center text-red-600 uppercase mb-4 italic">নতুন ম্যাচ পাবলিশ</h3>
                    <form id="m-form" class="space-y-3">
                        <input type="text" name="title" placeholder="ম্যাচের নাম" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none font-bold">
                        <div class="grid grid-cols-2 gap-2">
                            <select name="type" class="p-4 bg-gray-50 rounded-2xl border font-bold">
                                <option value="Solo">Solo</option><option value="Duo">Duo</option><option value="Squad">Squad</option>
                            </select>
                            <select name="map" class="p-4 bg-gray-50 rounded-2xl border font-bold">
                                <option value="Bermuda">Bermuda</option><option value="Kalahari">Kalahari</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold uppercase">পাবলিশ করুন</button>
                    </form>
                </div>
                <div id="m-list" class="mt-4 space-y-3"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // গুগল লগইন ফাংশন
        document.getElementById('login-btn').onclick = () => {
            signInWithPopup(auth, provider).catch(err => alert("লগইন এরর: " + err.message));
        };

        // লগআউট ফাংশন
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // অথেনটিকেশন স্টেট চেক (মেইন সিকিউরিটি)
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "yasinkhondoker333@gmail.com") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('admin-ui').classList.remove('hidden');
                initData();
            } else {
                if(user) { alert("আপনি এই অ্যাপের মালিক নন!"); signOut(auth); }
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('admin-ui').classList.add('hidden');
            }
        });

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        };

        function initData() {
            onSnapshot(collection(db, "users"), s => document.getElementById('stat-users').innerText = s.size);
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('m-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-[30px] shadow-sm flex justify-between items-center border-l-8 border-red-600">
                        <div><h4 class="font-bold uppercase">${m.title}</h4><p class="text-[10px] text-gray-500 font-bold">${m.type} | ${m.map}</p></div>
                        <button onclick="delMatch('${d.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
                });
            });
        }

        document.getElementById('m-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            await addDoc(collection(db, "matches"), {
                title: f.title.value, type: f.type.value, map: f.map.value, status: 'open'
            });
            alert("ম্যাচ পাবলিশ হয়েছে!"); f.reset();
        };

        window.delMatch = async (id) => { if(confirm("ডিলিট?")) await deleteDoc(doc(db, "matches", id)); };
    </script>
</body>
</html>
