<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena - Owner Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* পূর্ণ সুরক্ষা */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        input, textarea, select, .select-text { -webkit-user-select: text !important; user-select: text !important; }

        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* নিখুঁত পাশাপাশি গ্রিড মেনু */
        .owner-menu-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 25px 10px !important; width: 100% !important; }
        .menu-item { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.9); }
        .menu-icon-box { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: #fff; border: 1px solid #f1f5f9; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .menu-text { font-size: 11px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: 0.5px; }

        /* এরো বা সাইডবার লুকানোর জন্য */
        #loader { position: fixed; inset: 0; background: white; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--nagad-red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .tab-page { display: none; }
        .active-tab { display: block !important; }
        iframe, .appsgeyser-side-menu, #side-bar, .appsgeyser-arrow { display: none !important; visibility: hidden !important; pointer-events: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. NEATIVE LOADER -->
    <div id="loader">
        <div class="ring"></div>
        <h1 class="mt-4 text-3xl font-black text-red-600 italic tracking-tighter">BattleArena</h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Master Control</p>
    </div>

    <!-- 2. PIN SCREEN (yasin999) -->
    <div id="pin-screen" class="hidden fixed inset-0 bg-white z-[90000] flex flex-col items-center justify-center p-8 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="w-16 mb-6">
        <h2 class="text-xl font-bold text-gray-800 uppercase italic">OWNER VERIFICATION</h2>
        <input type="password" id="pin-input" maxlength="8" placeholder="••••••" class="w-full max-w-xs bg-gray-50 p-5 rounded-[30px] text-center text-3xl tracking-[15px] border-2 border-gray-100 focus:border-red-500 outline-none my-8 shadow-inner">
        <button onclick="verifyPin()" class="w-full max-w-xs nagad-gradient text-white py-4 rounded-[25px] font-bold shadow-xl active:scale-95 transition">ACCESS PANEL</button>
    </div>

    <!-- 3. MAIN DASHBOARD CONTENT -->
    <div id="app-body" class="hidden min-h-screen pb-32">
        
        <!-- HEADER (NAGAD STYLE) -->
        <header class="nagad-gradient p-6 pb-28 text-white sticky top-0 z-[1000] rounded-b-[50px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold border border-white/30 shadow-inner">O</div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight uppercase" id="header-owner">Owner</h2>
                        <p class="text-[10px] opacity-80 uppercase font-bold text-yellow-300" id="header-status">Master Verified</p>
                    </div>
                </div>
                <button onclick="exitAdmin()" class="bg-white/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-white/10 active:bg-red-800"><i class="fas fa-power-off"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-10">
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70 mb-1" id="stat-lbl-income">Total Income</p>
                    <h3 class="text-xl font-bold italic">৳ <span id="stat-money">0.00</span></h3>
                </div>
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70 mb-1" id="stat-lbl-users">Total Users</p>
                    <h3 class="text-xl font-bold italic" id="stat-users">0</h3>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-16 relative z-[1100]">
            <!-- GRID MENU (নিখুঁত পাশাপাশি ৩টি আইকন) -->
            <div id="tab-home" class="tab-page active-tab bg-white rounded-[40px] p-8 card-shadow border border-gray-50 mb-8">
                <div class="owner-menu-grid">
                    <!-- Row 1 -->
                    <div onclick="switchPage('matches')" class="menu-item">
                        <div class="menu-icon-box text-red-600"><i class="fas fa-trophy"></i></div>
                        <span class="menu-text" id="menu-match">ম্যাচ</span>
                    </div>
                    <div onclick="switchPage('wallet')" class="menu-item relative">
                        <div class="menu-icon-box text-blue-600"><i class="fas fa-wallet"></i></div>
                        <span class="menu-text" id="menu-wallet">ওয়ালেট</span>
                        <div id="wallet-badge" class="absolute top-0 right-3 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</div>
                    </div>
                    <div onclick="switchPage('support')" class="menu-item relative">
                        <div class="menu-icon-box text-green-600"><i class="fas fa-headset"></i></div>
                        <span class="menu-text" id="menu-support">সেবা</span>
                        <div id="support-badge" class="absolute top-0 right-3 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</div>
                    </div>
                    <!-- Row 2 -->
                    <div onclick="switchPage('banner')" class="menu-item">
                        <div class="menu-icon-box text-purple-600"><i class="fas fa-images"></i></div>
                        <span class="menu-text" id="menu-banner">ব্যানার</span>
                    </div>
                    <div onclick="switchPage('notify')" class="menu-item">
                        <div class="menu-icon-box text-yellow-500"><i class="fas fa-bullhorn"></i></div>
                        <span class="menu-text" id="menu-notif">নোটিশ</span>
                    </div>
                    <div onclick="switchPage('settings')" class="menu-item">
                        <div class="menu-icon-box text-gray-600"><i class="fas fa-cog"></i></div>
                        <span class="menu-text" id="menu-config">সেটিংস</span>
                    </div>
                </div>
            </div>

            <!-- TAB: WALLET -->
            <div id="tab-wallet" class="tab-page">
                <h3 class="font-bold text-gray-800 text-lg mb-4 uppercase italic">Wallet Activities</h3>
                <div id="wallet-list" class="space-y-4"></div>
                <button onclick="switchPage('home')" class="w-full mt-6 text-gray-400 font-bold uppercase text-xs">Back to Home</button>
            </div>

            <!-- TAB: SUPPORT -->
            <div id="tab-support" class="tab-page">
                <h3 class="font-bold text-gray-800 text-lg mb-4 uppercase italic">Support Box</h3>
                <div id="support-list" class="space-y-4"></div>
                <button onclick="switchPage('home')" class="w-full mt-6 text-gray-400 font-bold uppercase text-xs">Back to Home</button>
            </div>

            <!-- TAB: SETTINGS (3 NUMBERS + LANG) -->
            <div id="tab-settings" class="tab-page">
                <div class="bg-white p-7 rounded-[40px] card-shadow border border-gray-100 space-y-5">
                    <h3 class="font-bold text-gray-800 uppercase text-center border-b pb-3" id="config-title">App Configuration</h3>
                    <div class="space-y-4">
                        <div><label class="text-[9px] font-black text-red-600 uppercase ml-2">Nagad Number</label><input type="text" id="set-nagad" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100 font-bold"></div>
                        <div><label class="text-[9px] font-black text-orange-600 uppercase ml-2">Bkash Number</label><input type="text" id="set-bkash" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100 font-bold"></div>
                        <div><label class="text-[9px] font-black text-blue-600 uppercase ml-2">Rocket Number</label><input type="text" id="set-rocket" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text border border-gray-100 font-bold"></div>
                        <div><label class="text-[9px] font-black text-gray-400 uppercase ml-2">Language (ভাষা)</label><select id="set-lang" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border border-gray-100 font-bold"><option value="bn">Bengali</option><option value="en">English</option></select></div>
                        <button onclick="saveAppSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase tracking-widest">Update Settings</button>
                    </div>
                </div>
            </div>

            <!-- TAB: MATCHES -->
            <div id="tab-matches" class="tab-page">
                <div class="flex justify-between items-center mb-6"><h3 class="font-bold text-gray-800 text-lg uppercase italic">Tournaments</h3><button onclick="openModal('modal-add')" class="bg-red-600 text-white px-5 py-2 rounded-2xl text-xs font-bold">+ New</button></div>
                <div id="match-list" class="space-y-4"></div>
            </div>
            
            <!-- Other pages same logic -->
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[2000] rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="switchPage('home')" id="nav-home" class="nav-icon text-red-600 flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold">HOME</span></button>
            <button onclick="switchPage('wallet')" id="nav-wallet" class="nav-icon text-gray-300 flex flex-col items-center"><i class="fas fa-wallet text-xl"></i><span class="text-[9px] font-bold">WALLET</span></button>
            <button onclick="switchPage('settings')" id="nav-settings" class="nav-icon text-gray-300 flex flex-col items-center"><i class="fas fa-cog text-xl"></i><span class="text-[9px] font-bold">CONFIG</span></button>
        </nav>
    </div>

    <!-- MODAL: ADD MATCH -->
    <div id="modal-add" class="fixed inset-0 bg-black/60 z-[100000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold mb-6 text-center text-red-600 uppercase italic">Match Setup</h3>
            <form id="match-form" class="space-y-4">
                <input type="text" name="title" placeholder="Title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold select-text" required>
                <div class="grid grid-cols-2 gap-3"><input type="number" name="fee" placeholder="Fee ৳" class="bg-gray-50 p-4 rounded-2xl outline-none select-text" required><input type="number" name="prize" placeholder="Prize ৳" class="bg-gray-50 p-4 rounded-2xl outline-none select-text" required></div>
                <div class="grid grid-cols-2 gap-3"><select name="map" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border-none"><option value="Bermuda">Bermuda</option><option value="Purgatory">Purgatory</option></select><select name="type" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border-none"><option value="Solo">Solo</option><option value="Squad">Squad</option></select></div>
                <input type="text" name="releaseTime" placeholder="9:30 PM" class="w-full bg-gray-50 p-4 rounded-2xl outline-none select-text" required>
                <div class="flex gap-3 pt-4"><button type="button" onclick="closeModal('modal-add')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-400">EXIT</button><button type="submit" class="flex-[2] nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Publish</button></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PIN = "yasin999";

        window.verifyPin = () => { if(document.getElementById('pin-input').value === MASTER_PIN) { localStorage.setItem('ba_v6_final', 'true'); location.reload(); } else alert("PIN Error!"); };
        window.exitAdmin = () => { localStorage.removeItem('ba_v6_final'); location.reload(); };

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                if(localStorage.getItem('ba_v6_final') === 'true') { document.getElementById('app-body').classList.remove('hidden'); initEngine(); }
                else document.getElementById('pin-screen').classList.remove('hidden');
            }, 1800);
        });

        // ট্যাগ পরিবর্তন করার সময় কোনো লোডিং হবে না, সাথে সাথে পেজ শো হবে
        window.switchPage = (id) => {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab'));
            document.getElementById('tab-'+id).classList.add('active-tab');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.replace('text-red-600', 'text-gray-300'));
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.replace('text-gray-300', 'text-red-600');
        };

        // ভাষা পরিবর্তন ডেটা
        const langMap = {
            en: { owner: "Owner", status: "Master Verified", income: "Total Income", users: "Total Users", m_match: "Match", m_wallet: "Wallet", m_support: "Support", m_banner: "Banners", m_notif: "Notice", m_config: "Settings" },
            bn: { owner: "ওনার", status: "মাস্টার ভেরিফাইড", income: "মোট আয়", users: "মোট ইউজার", m_match: "ম্যাচ", m_wallet: "ওয়ালেট", m_support: "সেবা", m_banner: "ব্যানার", m_notif: "নোটিশ", m_config: "সেটিংস" }
        };

        function applyLang(lang) {
            const d = langMap[lang] || langMap.bn;
            document.getElementById('header-owner').innerText = d.owner; document.getElementById('header-status').innerText = d.status;
            document.getElementById('stat-lbl-income').innerText = d.income; document.getElementById('stat-lbl-users').innerText = d.users;
            document.getElementById('menu-match').innerText = d.m_match; document.getElementById('menu-wallet').innerText = d.m_wallet;
            document.getElementById('menu-support').innerText = d.m_support; document.getElementById('menu-banner').innerText = d.m_banner;
            document.getElementById('menu-notif').innerText = d.m_notif; document.getElementById('menu-config').innerText = d.m_config;
        }

        function initEngine() {
            // Stats Real-time
            onSnapshot(collection(db, "users"), s => document.getElementById('stat-users').innerText = s.size);
            onSnapshot(query(collection(db, "registrations"), where("status", "==", "approved")), s => {
                let cash = 0; s.forEach(d => cash += Number(d.data().fee || 0));
                document.getElementById('stat-money').innerText = cash.toFixed(2);
            });
            // Config Real-time
            onSnapshot(doc(db, "app_settings", "config"), d => {
                if(d.exists()) {
                    document.getElementById('set-nagad').value = d.data().nagad || "";
                    document.getElementById('set-bkash').value = d.data().bkash || "";
                    document.getElementById('set-rocket').value = d.data().rocket || "";
                    document.getElementById('set-lang').value = d.data().language || "bn";
                    applyLang(d.data().language || "bn");
                }
            });
            // All Data Synced in background
            syncAllData();
        }

        window.saveAppSettings = async () => {
            const nagad = document.getElementById('set-nagad').value;
            const bkash = document.getElementById('set-bkash').value;
            const rocket = document.getElementById('set-rocket').value;
            const lang = document.getElementById('set-lang').value;
            await setDoc(doc(db, "app_settings", "config"), { nagad, bkash, rocket, language: lang });
            alert("Updated Successfully!");
        };

        function syncAllData() {
            // Wallet List
            onSnapshot(query(collection(db, "wallet_requests"), where("status", "==", "pending")), snap => {
                const list = document.getElementById('wallet-list'); list.innerHTML = '';
                document.getElementById('wallet-badge').innerText = snap.size;
                document.getElementById('wallet-badge').style.display = snap.size > 0 ? 'block' : 'none';
                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-[30px] card-shadow border-l-[10px] border-blue-500"><h4 class="font-bold text-gray-800 text-sm italic uppercase">${r.email}</h4><p class="text-sm font-black text-red-600 mt-1">৳${r.amount} | ${r.type}</p><div class="mt-4 flex gap-2"><button onclick="approveWallet('${d.id}', '${r.uid}', ${r.amount}, '${r.type}')" class="flex-1 nagad-gradient text-white py-2 rounded-xl font-bold text-[10px]">APPROVE</button><button onclick="delDoc('wallet_requests', '${d.id}')" class="flex-1 bg-gray-100 text-gray-400 py-2 rounded-xl font-bold text-[10px]">REJECT</button></div></div>`;
                });
            });
            // Support List
            onSnapshot(query(collection(db, "support_messages"), orderBy("timestamp", "desc")), snap => {
                const list = document.getElementById('support-list'); list.innerHTML = '';
                let unread = 0;
                snap.forEach(d => {
                    const m = d.data(); if(!m.adminReply) unread++;
                    list.innerHTML += `<div class="bg-white p-5 rounded-[30px] card-shadow border-l-[10px] ${m.adminReply ? 'border-gray-100' : 'border-green-500'}"><p class="text-[9px] font-bold text-gray-400 uppercase">${m.email}</p><p class="text-sm font-bold text-gray-800 mt-1">${m.message}</p>${m.adminReply ? `<p class="mt-2 text-xs text-blue-500 italic font-bold">Reply: ${m.adminReply}</p>` : `<button onclick="replyMsg('${d.id}')" class="mt-3 bg-green-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold">REPLY</button>`}</div>`;
                });
                document.getElementById('support-badge').innerText = unread;
                document.getElementById('support-badge').style.display = unread > 0 ? 'block' : 'none';
            });
            // Matches List
            onSnapshot(query(collection(db, "matches"), orderBy("createdAt", "desc")), s => {
                const list = document.getElementById('match-list'); list.innerHTML = '';
                s.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-[35px] card-shadow border-l-[12px] border-red-600 flex justify-between items-center"><div><h4 class="font-bold text-gray-800 text-sm uppercase italic">${m.title}</h4><div class="mt-3 flex gap-2"><button onclick="releaseRoom('${d.id}')" class="bg-red-50 text-red-600 text-[10px] px-3 py-1 rounded-xl font-bold">ROOM ID</button><button onclick="delDoc('matches','${d.id}')" class="bg-gray-50 text-gray-400 text-[10px] px-3 py-1 rounded-xl font-bold">DELETE</button></div></div><span class="bg-green-100 text-green-600 text-[9px] font-black px-4 py-1.5 rounded-full uppercase">${m.status}</span></div>`;
                });
            });
        }

        window.approveWallet = async (id, uid, amount, type) => {
            const userSnap = await getDoc(doc(db, "users", uid));
            if(userSnap.exists()) {
                let bal = userSnap.data().balance || 0;
                if(type === 'deposit') bal += Number(amount);
                await updateDoc(doc(db, "users", uid), { balance: bal });
                await updateDoc(doc(db, "wallet_requests", id), { status: 'approved' });
                alert("Approved!");
            }
        };

        window.replyMsg = async (id) => { const r = prompt("Reply:"); if(r) await updateDoc(doc(db, "support_messages", id), { adminReply: r }); };
        window.releaseRoom = async (id) => { const rid = prompt("Room ID:"); const rps = prompt("Password:"); if(rid && rps) await updateDoc(doc(db, "matches", id), { roomID: rid, roomPass: rps, status: 'live' }); };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.delDoc = async (col, id) => { if(confirm("Delete?")) await deleteDoc(doc(db, col, id)); };

    </script>
</body>
</html>
