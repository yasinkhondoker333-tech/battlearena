<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        input, select, textarea { -webkit-user-select: text !important; user-select: text !important; }
        body { background-color: #0b0e14; color: #e2e8f0; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .gaming-font { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .orange-btn { background: linear-gradient(90deg, #f97316 0%, #ea580c 100%); transition: 0.3s; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen pb-20" oncontextmenu="return false;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- PIN SECURITY LOGIC ---
        const MASTER_PIN = "yasin999"; // আপনার পিন এখানে সেট করা হলো

        window.checkPin = () => {
            const inputPin = document.getElementById('admin-pin').value;
            if(inputPin === MASTER_PIN) {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                localStorage.setItem('admin_auth', 'true'); // পিন মনে রাখার জন্য
                loadData();
            } else {
                alert("ভুল পিন! আবার চেষ্টা করুন।");
                document.getElementById('admin-pin').value = '';
            }
        };

        // অটো লগইন চেক
        if(localStorage.getItem('admin_auth') === 'true') {
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadData();
            });
        }

        window.adminLogout = () => {
            localStorage.removeItem('admin_auth');
            location.reload();
        };

        // --- DASHBOARD LOGIC ---
        window.createMatch = async (e) => {
            e.preventDefault();
            const data = { title: e.target.title.value, fee: e.target.fee.value, prize: e.target.prize.value, time: e.target.time.value, map: e.target.map.value, type: e.target.type.value, status: 'open', roomID: '', roomPass: '', createdAt: new Date().getTime() };
            await addDoc(collection(db, "matches"), data);
            alert("Match Published!"); e.target.reset(); switchTab('manage-matches');
        };

        function loadData() {
            onSnapshot(query(collection(db, "matches"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('match-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="glass-card p-4 rounded-xl mb-3 border-l-4 border-orange-500"><div class="flex justify-between"><div><h3 class="font-bold text-orange-400 text-sm uppercase italic">${m.title}</h3><p class="text-[10px] text-gray-400">${m.time} | Fee: ৳${m.fee}</p></div><button onclick="deleteMatch('${d.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div><div class="flex gap-2 mt-3"><button onclick="setRoom('${d.id}')" class="flex-1 bg-blue-600 text-[10px] py-2 rounded font-bold uppercase">Update Room Info</button><span class="bg-slate-700 px-3 py-2 rounded text-[10px] uppercase font-bold">${m.status}</span></div></div>`;
                });
            });

            onSnapshot(query(collection(db, "registrations"), where("status", "==", "pending")), (snap) => {
                const reqList = document.getElementById('request-list'); reqList.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data();
                    reqList.innerHTML += `<div class="glass-card p-4 rounded-xl mb-3 flex justify-between items-center border-l-4 border-blue-500"><div><p class="font-bold text-sm text-white uppercase">${r.playerName}</p><p class="text-[10px] text-orange-400 font-bold">TrxID: ${r.trxID}</p><p class="text-[10px] text-gray-400">UID: ${r.gameID}</p></div><div class="flex gap-2"><button onclick="approve('${d.id}')" class="bg-green-600 w-10 h-10 rounded-full"><i class="fas fa-check"></i></button><button onclick="reject('${d.id}')" class="bg-red-600 w-10 h-10 rounded-full"><i class="fas fa-times"></i></button></div></div>`;
                });
            });
        }

        window.setRoom = async (id) => { const rid = prompt("Enter Room ID:"); const rpass = prompt("Enter Room Pass:"); if(rid && rpass) { await updateDoc(doc(db, "matches", id), { roomID: rid, roomPass: rpass, status: 'live' }); alert("Room ID & Pass Sent to Players!"); } };
        window.deleteMatch = async (id) => { if(confirm("Delete Match?")) await deleteDoc(doc(db, "matches", id)); };
        window.approve = async (id) => { await updateDoc(doc(db, "registrations", id), { status: 'approved' }); alert("Player Approved!"); };
        window.reject = async (id) => { if(confirm("Reject Player?")) await deleteDoc(doc(db, "registrations", id)); };
        window.switchTab = (id) => { document.querySelectorAll('.tab-page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); };
    </script>

    <!-- UI: PIN SCREEN -->
    <div id="pin-screen" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass-card p-10 rounded-3xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-bold gaming-font text-orange-500 mb-2 uppercase">BattleArena</h1>
            <p class="text-xs text-gray-400 mb-8 uppercase tracking-widest">Enter Master PIN to Access</p>
            <input type="password" id="admin-pin" placeholder="Enter PIN" class="w-full p-4 rounded-2xl text-center text-2xl tracking-[10px] outline-none mb-6">
            <button onclick="checkPin()" class="w-full orange-btn py-4 rounded-2xl font-bold gaming-font uppercase shadow-lg">Access Panel</button>
        </div>
    </div>

    <!-- UI: ADMIN CONTENT -->
    <div id="admin-content" class="hidden">
        <header class="p-4 glass-card sticky top-0 z-50 flex justify-between items-center">
            <h2 class="gaming-font text-orange-500 text-lg">BATTLEARENA ADMIN</h2>
            <button onclick="adminLogout()" class="text-xs text-red-500 font-bold bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">EXIT</button>
        </header>

        <main class="p-4">
            <div id="home" class="tab-page text-center">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="glass-card p-4 rounded-2xl"><p class="text-[10px] text-gray-400 uppercase">Server</p><h4 class="text-xl font-bold text-green-500">LIVE</h4></div>
                    <div class="glass-card p-4 rounded-2xl"><p class="text-[10px] text-gray-400 uppercase">Security</p><h4 class="text-xl font-bold text-orange-500">HIGH</h4></div>
                </div>
                <div class="space-y-4">
                    <button onclick="switchTab('create-match')" class="w-full glass-card p-6 rounded-2xl flex justify-between items-center font-bold"><span><i class="fas fa-plus-circle mr-2 text-orange-500 text-xl"></i> SETUP NEW MATCH</span><i class="fas fa-chevron-right opacity-30"></i></button>
                    <button onclick="switchTab('verify-players')" class="w-full glass-card p-6 rounded-2xl flex justify-between items-center font-bold"><span><i class="fas fa-user-check mr-2 text-blue-500 text-xl"></i> JOIN REQUESTS</span><i class="fas fa-chevron-right opacity-30"></i></button>
                    <button onclick="switchTab('manage-matches')" class="w-full glass-card p-6 rounded-2xl flex justify-between items-center font-bold"><span><i class="fas fa-list mr-2 text-green-500 text-xl"></i> MANAGE MATCHES</span><i class="fas fa-chevron-right opacity-30"></i></button>
                </div>
            </div>

            <div id="create-match" class="tab-page hidden">
                <h3 class="font-bold mb-4 gaming-font text-orange-500">NEW TOURNAMENT</h3>
                <form onsubmit="createMatch(event)" class="space-y-3">
                    <input type="text" name="title" placeholder="Match Title (e.g. Solo Match)" class="w-full p-4 rounded-xl outline-none" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" name="fee" placeholder="Entry Fee ৳" class="w-full p-4 rounded-xl outline-none" required>
                        <input type="number" name="prize" placeholder="Win Prize ৳" class="w-full p-4 rounded-xl outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select name="map" class="w-full p-4 rounded-xl outline-none"><option value="Bermuda">Bermuda</option><option value="Purgatory">Purgatory</option></select>
                        <select name="type" class="w-full p-4 rounded-xl outline-none"><option value="Solo">Solo</option><option value="Squad">Squad</option></select>
                    </div>
                    <input type="text" name="time" placeholder="Date & Time (e.g. 10 PM)" class="w-full p-4 rounded-xl outline-none" required>
                    <button type="submit" class="w-full orange-btn py-4 rounded-xl font-bold gaming-font">PUBLISH NOW</button>
                </form>
                <button onclick="switchTab('home')" class="w-full mt-6 text-gray-500 text-sm italic">Back to Home</button>
            </div>

            <div id="manage-matches" class="tab-page hidden"><h3 class="font-bold mb-4 gaming-font text-orange-500">LIVE TOURNAMENTS</h3><div id="match-list"></div><button onclick="switchTab('home')" class="w-full mt-6 text-gray-500 text-sm">Back</button></div>
            <div id="verify-players" class="tab-page hidden"><h3 class="font-bold mb-4 gaming-font text-blue-400 text-center">PENDING APPROVALS</h3><div id="request-list"></div><button onclick="switchTab('home')" class="w-full mt-6 text-gray-500 text-sm">Back</button></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-card flex justify-around p-4 border-t border-white/5 rounded-t-3xl">
            <button onclick="switchTab('home')" class="flex flex-col items-center text-orange-500"><i class="fas fa-home"></i><span class="text-[10px] mt-1 font-bold">Home</span></button>
            <button onclick="switchTab('manage-matches')" class="flex flex-col items-center text-gray-400"><i class="fas fa-gamepad"></i><span class="text-[10px] mt-1 font-bold">Matches</span></button>
            <button onclick="switchTab('verify-players')" class="flex flex-col items-center text-gray-500"><i class="fas fa-user-shield"></i><span class="text-[10px] mt-1 font-bold">Requests</span></button>
        </nav>
    </div>

</body>
</html>
