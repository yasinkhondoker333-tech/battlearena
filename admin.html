<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nagad-gradient { background: linear-gradient(45deg, #ed1c24, #f7941d); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="login-page" class="fixed inset-0 bg-white flex flex-col items-center justify-center p-6 z-50">
        <img src="https://i.ibb.co/LhYnZpG/logo.png" class="w-32 mb-6">
        <h2 class="text-2xl font-black text-red-600 uppercase italic mb-8">Admin Access</h2>
        <input type="email" id="login-email" placeholder="Admin Email" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-4 outline-none font-bold">
        <input type="password" id="login-pin" placeholder="Enter PIN" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-6 outline-none font-bold text-center tracking-widest">
        <button onclick="login()" class="w-full max-w-xs nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Login System</button>
    </div>

    <div id="admin-dashboard" class="hidden pb-24">
        <div class="nagad-gradient p-8 rounded-b-[50px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Administrator</p>
                    <h1 class="text-2xl font-black italic uppercase">Yasin Ar-Rayan</h1>
                </div>
                <button onclick="logout()" class="bg-white/20 p-3 rounded-2xl backdrop-blur-md"><i class="fas fa-power-off"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-5 rounded-[30px] backdrop-blur-md border border-white/20">
                    <p class="text-[9px] font-bold opacity-70 uppercase">Total Income</p>
                    <h3 class="text-xl font-black">৳ <span id="stat-money">0.00</span></h3>
                </div>
                <div class="bg-white/10 p-5 rounded-[30px] backdrop-blur-md border border-white/20">
                    <p class="text-[9px] font-bold opacity-70 uppercase">Active Users</p>
                    <h3 class="text-xl font-black" id="stat-users">0</h3>
                </div>
            </div>
        </div>

        <div class="p-5">
            <div id="config-section" class="section-content">
                <div class="bg-white p-6 rounded-[40px] card-shadow mb-6 border border-gray-100">
                    <h3 class="font-black text-gray-800 uppercase italic mb-6 flex items-center gap-2">
                        <i class="fas fa-cogs text-red-500"></i> Payment Settings
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Nagad Number</label>
                            <input id="set-nagad" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-gray-700 mt-1">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">bKash Number</label>
                            <input id="set-bkash" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-gray-700 mt-1">
                        </div>
                        <button onclick="saveAppSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold uppercase shadow-md mt-4">Save All Settings</button>
                    </div>
                </div>
            </div>

            <div id="home-section" class="section-content">
                <div id="match-list" class="space-y-4"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-8 py-4 flex justify-between items-center z-40">
            <button class="text-gray-300 text-xl"><i class="fas fa-home"></i></button>
            <button onclick="openModal('modal-add')" class="nagad-gradient w-14 h-14 rounded-2xl text-white shadow-lg shadow-red-200 -mt-12 border-4 border-white flex items-center justify-center text-xl">
                <i class="fas fa-plus"></i>
            </button>
            <button class="text-red-500 text-xl"><i class="fas fa-th-large"></i></button>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex-col justify-end">
        <div class="bg-white rounded-t-[50px] p-8 animate-slide-up">
            <h3 class="text-center font-black text-red-600 uppercase italic mb-8 underline decoration-4 underline-offset-8">Create New Match</h3>
            <form id="match-form" class="space-y-4">
                <input name="title" placeholder="Match Title (e.g. Daily Solo)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                <div class="grid grid-cols-2 gap-4">
                    <input name="fee" placeholder="Entry Fee" class="p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                    <input name="prize" placeholder="Total Prize" class="p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                </div>
                <select name="map" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-bold">
                    <option value="Bermuda">Bermuda</option>
                    <option value="Kalahari">Kalahari</option>
                    <option value="Purgatory">Purgatory</option>
                </select>
                <div class="flex gap-4">
                    <button type="button" onclick="closeModal('modal-add')" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold uppercase">Exit</button>
                    <button type="submit" class="flex-[2] nagad-gradient text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Publish Match</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyAs-XXXXXXXXXXXX", // আপনার আসল API Key এখানে দিন
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.appspot.com",
            messagingSenderId: "XXXXXXXX",
            appId: "XXXXXXXX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Auth Logic
        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                syncAllData();
            } else {
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        window.login = async () => {
            const email = document.getElementById('login-email').value;
            const pin = document.getElementById('login-pin').value;
            try { await signInWithEmailAndPassword(auth, email, pin); } catch(e) { alert("PIN Wrong!"); }
        };

        window.logout = () => signOut(auth);

        // Data Sync
        function syncAllData() {
            onSnapshot(collection(db, "app_settings"), s => {
                const d = s.docs[0]?.data();
                if(d) {
                    document.getElementById('set-nagad').value = d.nagad || '';
                    document.getElementById('set-bkash').value = d.bkash || '';
                }
            });
            // Stats Sync
            onSnapshot(collection(db, "users"), s => document.getElementById('stat-users').innerText = s.size);
        }

        window.saveAppSettings = async () => {
            try {
                await setDoc(doc(db, "app_settings", "config"), {
                    nagad: document.getElementById('set-nagad').value,
                    bkash: document.getElementById('set-bkash').value
                }, { merge: true });
                alert("Updated!");
            } catch(e) { alert(e.message); }
        };

        // Match Logic
        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            try {
                await addDoc(collection(db, "matches"), {
                    title: f.title.value, map: f.map.value, fee: f.fee.value, prize: f.prize.value,
                    status: 'open', createdAt: new Date().getTime()
                });
                alert("Success!"); closeModal('modal-add'); f.reset();
            } catch(e) { alert(e.message); }
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

    </script>
</body>
</html>
