<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleArena Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8f9fb; }
        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-red-600 flex items-center justify-center z-[99999]">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl w-85 text-center">
            <h2 class="text-2xl font-bold text-red-600 mb-6 uppercase italic">Owner Secure Login</h2>
            <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড দিন" class="w-full p-4 bg-gray-100 rounded-2xl border mb-4 text-center outline-none focus:border-red-500">
            <button onclick="login()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Login</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="nagad-gradient p-6 pb-24 text-white rounded-b-[50px] shadow-lg">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-xl uppercase italic tracking-wider">Yasin Ar-Rayan</h2>
                <button onclick="location.reload()" class="bg-white/20 p-2 rounded-xl border border-white/30"><i class="fas fa-power-off"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-white/10 p-5 rounded-3xl text-center border border-white/20 backdrop-blur-md">
                    <p class="text-[10px] uppercase opacity-70">Total Users</p>
                    <h3 id="u-count" class="text-xl font-bold">0</h3>
                </div>
                <div class="bg-white/10 p-5 rounded-3xl text-center border border-white/20 backdrop-blur-md">
                    <p class="text-[10px] uppercase opacity-70">Total Income</p>
                    <h3 id="u-money" class="text-xl font-bold">৳ 0.00</h3>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-12 pb-24">
            <div id="home-menu" class="page-content active bg-white rounded-[40px] p-8 shadow-xl grid grid-cols-3 gap-6 mb-6">
                <div onclick="openPage('matches')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-trophy text-red-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">ম্যাচ</span></div>
                <div onclick="openPage('wallet')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-wallet text-blue-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">ওয়ালেট</span></div>
                <div onclick="openPage('support')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-headset text-green-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">সেবা</span></div>
                <div onclick="openPage('banner')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-image text-purple-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">ব্যানার</span></div>
                <div onclick="openPage('notice')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-bullhorn text-orange-500 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">নোটিশ</span></div>
                <div onclick="openPage('config')" class="flex flex-col items-center cursor-pointer"><i class="fas fa-cog text-gray-600 text-2xl"></i><span class="text-[10px] mt-2 font-bold uppercase">সেটিংস</span></div>
            </div>

            <div id="matches-page" class="page-content space-y-4">
                <div class="bg-white p-7 rounded-[40px] shadow-md border border-gray-100">
                    <h3 class="font-bold text-center text-red-600 mb-4 uppercase italic">ম্যাচ পাবলিশ</h3>
                    <form id="m-form" class="space-y-3">
                        <input type="text" name="title" placeholder="ম্যাচের নাম" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none font-bold" required>
                        <select name="map" class="w-full p-4 bg-gray-50 rounded-2xl border font-bold">
                            <option value="Bermuda">Bermuda</option>
                            <option value="Kalahari">Kalahari</option>
                            <option value="Purgatory">Purgatory</option>
                        </select>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" name="fee" placeholder="এন্ট্রি ফি" class="p-4 bg-gray-50 rounded-2xl border" required>
                            <input type="number" name="prize" placeholder="পুরস্কার" class="p-4 bg-gray-50 rounded-2xl border" required>
                        </div>
                        <input type="text" name="time" placeholder="সময় (যেমন: 11:00 PM)" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none" required>
                        <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase">পাবলিশ করুন</button>
                    </form>
                </div>
                <div id="m-list" class="space-y-3"></div>
            </div>

            <div id="config-page" class="page-content">
                <div class="bg-white p-7 rounded-[40px] shadow-md border border-gray-100 text-center">
                    <h3 class="font-bold mb-4 uppercase italic">পেমেন্ট মেথড আপডেট</h3>
                    <input type="text" id="pay-bkash" placeholder="বিকাশ নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl border mb-3 outline-none">
                    <input type="text" id="pay-nagad" placeholder="নগদ নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl border mb-3 outline-none">
                    <button onclick="saveSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">সেভ করুন</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = () => {
            if(document.getElementById('admin-pass').value === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').classList.remove('hidden');
                sync();
            } else { alert("ভুল পাসওয়ার্ড!"); }
        };

        window.openPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id+'-page').classList.add('active');
        };

        function sync() {
            onSnapshot(collection(db, "users"), s => document.getElementById('u-count').innerText = s.size);
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('m-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-[30px] shadow-sm flex justify-between items-center border-l-8 border-red-600">
                        <div><h4 class="font-bold uppercase">${m.title}</h4><p class="text-[10px] text-gray-500 font-bold mt-1">${m.map} | Fee: ৳${m.fee}</p></div>
                        <button onclick="delMatch('${d.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
                });
            });
        }

        document.getElementById('m-form').onsubmit = async (e) => {
            e.preventDefault();
            const f = e.target;
            try {
                await addDoc(collection(db, "matches"), {
                    title: f.title.value, map: f.map.value, fee: f.fee.value, prize: f.prize.value, time: f.time.value, status: 'open'
                });
                alert("ম্যাচ পাবলিশ হয়েছে!"); f.reset();
            } catch (err) { alert("এরর: " + err.message); }
        };

        window.delMatch = async (id) => { if(confirm("ডিলিট করবেন?")) await deleteDoc(doc(db, "matches", id)); };

        window.saveSettings = async () => {
            const b = document.getElementById('pay-bkash').value;
            const n = document.getElementById('pay-nagad').value;
            await setDoc(doc(db, "settings", "payment"), { bkash: b, nagad: n });
            alert("নম্বর সেভ হয়েছে!");
        };
    </script>
</body>
</html>
