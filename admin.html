<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena - OWNER Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0; }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        input, textarea, select, .select-text { -webkit-user-select: text !important; user-select: text !important; }

        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .menu-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 20px 10px !important; padding: 10px; width: 100%; text-align: center; }
        .menu-item { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; position: relative; }
        .menu-icon-box { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: #fff; border: 1px solid #f1f5f9; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .menu-item:active .menu-icon-box { transform: scale(0.9); background-color: #fee2e2; }
        .menu-text { font-size: 11px; font-weight: 700; color: #4b5563; text-transform: uppercase; }

        #loader { position: fixed; inset: 0; background: white; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 4px solid var(--nagad-red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .tab-page { display: none; padding-bottom: 80px; }
        .active-tab { display: block !important; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. NEATIVE LOADER -->
    <div id="loader"><div class="ring"></div><h1 class="mt-4 text-3xl font-black text-red-600 italic tracking-tighter uppercase font-sans">BattleArena</h1><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">OWNER CONTROL</p></div>

    <!-- 2. PIN SCREEN (yasin999) -->
    <div id="pin-screen" class="hidden fixed inset-0 bg-white z-[90000] flex flex-col items-center justify-center p-8 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="w-16 mb-6">
        <h2 class="text-xl font-bold text-gray-800 uppercase italic">OWNER LOGIN</h2>
        <input type="password" id="pin-input" maxlength="8" placeholder="••••••" class="w-full max-w-xs bg-gray-50 p-5 rounded-[30px] text-center text-3xl tracking-[15px] border-2 border-gray-100 focus:border-red-500 outline-none my-8 shadow-inner">
        <button onclick="verifyPin()" class="w-full max-w-xs nagad-gradient text-white py-4 rounded-[25px] font-bold shadow-xl">ACCESS PANEL</button>
    </div>

    <!-- 3. MAIN APP AREA -->
    <div id="app-body" class="hidden min-h-screen">
        <header class="nagad-gradient p-6 pb-28 text-white sticky top-0 z-[1000] rounded-b-[50px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold border border-white/30 shadow-inner uppercase font-sans">O</div>
                    <div class="text-left">
                        <h2 class="font-black text-xl leading-tight uppercase font-sans">OWNER</h2>
                        <p class="text-[11px] opacity-90 uppercase font-black text-yellow-300 tracking-widest font-sans italic">YASIN</p>
                    </div>
                </div>
                <button onclick="exitAdmin()" class="bg-white/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-white/10 active:bg-red-800 transition"><i class="fas fa-power-off"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-10">
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center"><p class="text-[9px] uppercase font-bold opacity-70 mb-1" id="lbl-income">Total Income</p><h3 class="text-xl font-bold italic font-sans">৳ <span id="stat-money">0.00</span></h3></div>
                <div class="bg-white/10 backdrop-blur-xl p-4 rounded-[30px] border border-white/10 text-center"><p class="text-[9px] uppercase font-bold opacity-70 mb-1" id="lbl-users">Total Users</p><h3 class="text-xl font-bold italic font-sans" id="stat-users">0</h3></div>
            </div>
        </header>

        <main class="px-5 -mt-16 relative z-[1100]">
            <!-- GRID MENU (SIDE BY SIDE 3 ICONS) -->
            <div id="tab-home" class="tab-page active-tab bg-white rounded-[40px] p-8 card-shadow border border-gray-50 mb-8">
                <div class="menu-grid">
                    <div onclick="switchPage('matches')" class="menu-item"><div class="menu-icon-box text-red-600"><i class="fas fa-trophy"></i></div><span class="menu-text" id="m-text-match">ম্যাচ</span></div>
                    <div onclick="switchPage('wallet')" class="menu-item relative"><div class="menu-icon-box text-blue-600"><i class="fas fa-wallet"></i></div><span class="menu-text" id="m-text-wallet">ওয়ালেট</span><div id="wallet-badge" class="absolute top-0 right-3 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</div></div>
                    <div onclick="switchPage('support')" class="menu-item relative"><div class="menu-icon-box text-green-600"><i class="fas fa-headset"></i></div><span class="menu-text" id="m-text-support">সেবা</span><div id="support-badge" class="absolute top-0 right-3 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</div></div>
                    <div onclick="switchPage('banner')" class="menu-item"><div class="menu-icon-box text-purple-600"><i class="fas fa-images"></i></div><span class="menu-text" id="m-text-banner">ব্যানার</span></div>
                    <div onclick="switchPage('notify')" class="menu-item"><div class="menu-icon-box text-yellow-500"><i class="fas fa-bullhorn"></i></div><span class="menu-text" id="m-text-notif">নোটিশ</span></div>
                    <div onclick="switchPage('settings')" class="menu-item"><div class="menu-icon-box text-gray-600"><i class="fas fa-cog"></i></div><span class="menu-text" id="m-text-config">সেটিংস</span></div>
                    <div onclick="switchPage('verify')" class="menu-item relative"><div class="menu-icon-box text-orange-600"><i class="fas fa-check-double"></i></div><span class="menu-text" id="m-text-verify">ভেরিফাই</span><div id="verify-badge" class="absolute top-0 right-3 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</div></div>
                </div>
            </div>

            <!-- PAGE: WALLET -->
            <div id="tab-wallet" class="tab-page"><h3 class="font-bold text-gray-800 text-lg mb-4 uppercase">Wallet Requests</h3><div id="wallet-list" class="space-y-4"></div></div>
            <!-- PAGE: SUPPORT -->
            <div id="tab-support" class="tab-page"><h3 class="font-bold text-gray-800 text-lg mb-4 uppercase">Support Inbox</h3><div id="support-list" class="space-y-4"></div></div>
            <!-- PAGE: VERIFY -->
            <div id="tab-verify" class="tab-page"><h3 class="font-bold text-gray-800 text-lg mb-4 uppercase">Join Verify</h3><div id="verify-list" class="space-y-4"></div></div>
            
            <!-- PAGE: NOTIFY (FIXED) -->
            <div id="tab-notify" class="tab-page">
                <div class="bg-white p-6 rounded-[35px] card-shadow border border-gray-50">
                    <h3 class="font-bold text-gray-800 mb-4 uppercase text-xs">Send News Notification</h3>
                    <textarea id="notif-text" rows="4" placeholder="Type notification..." class="w-full bg-gray-50 p-5 rounded-3xl outline-none select-text border border-gray-100 text-sm mb-4"></textarea>
                    <button onclick="sendNotice()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-xl">SEND NOW</button>
                </div>
            </div>

            <!-- PAGE: SETTINGS -->
            <div id="tab-settings" class="tab-page">
                <div class="bg-white p-7 rounded-[40px] card-shadow border border-gray-100 space-y-4">
                    <h3 class="font-bold text-gray-800 uppercase text-center border-b pb-3">Master Config</h3>
                    <input type="text" id="set-nagad" placeholder="Nagad" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 font-bold select-text outline-none">
                    <input type="text" id="set-bkash" placeholder="Bkash" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 font-bold select-text outline-none">
                    <input type="text" id="set-rocket" placeholder="Rocket" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 font-bold select-text outline-none">
                    <select id="set-lang" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 font-bold outline-none font-sans"><option value="bn">Bengali (বাংলা)</option><option value="en">English</option></select>
                    <button onclick="saveAppSettings()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase font-sans tracking-widest">Update Settings</button>
                </div>
            </div>

            <div id="tab-banner" class="tab-page">
                <div class="bg-white p-6 rounded-[35px] card-shadow text-center"><input type="file" id="file-input" accept="image/*" class="hidden" onchange="previewImg(event)"><div onclick="document.getElementById('file-input').click()" id="upload-preview" class="w-full h-40 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center cursor-pointer mb-4 italic">Select Image</div><button id="upload-btn" onclick="uploadBannerAction()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg opacity-50" disabled>UPLOAD NOW</button></div><div id="banner-list" class="flex gap-4 overflow-x-auto mt-8"></div>
            </div>
            
            <div id="tab-matches" class="tab-page"><div class="flex justify-between items-center mb-6 px-2"><h3 class="font-bold text-gray-800 text-lg uppercase italic font-sans">Matches</h3><button onclick="openModal('modal-add')" class="bg-red-600 text-white px-5 py-2.5 rounded-2xl text-xs font-bold">+ New</button></div><div id="match-list" class="space-y-4"></div></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[2000] rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="switchPage('home')" id="nav-home" class="nav-btn text-red-600 flex flex-col items-center font-bold"><i class="fas fa-home text-xl"></i><span class="text-[9px]">HOME</span></button>
            <button onclick="switchPage('settings')" id="nav-settings" class="nav-btn text-gray-300 flex flex-col items-center font-bold"><i class="fas fa-cog text-xl"></i><span class="text-[9px]">CONFIG</span></button>
            <button onclick="switchPage('matches')" id="nav-matches" class="nav-btn text-gray-300 flex flex-col items-center font-bold"><i class="fas fa-trophy text-xl"></i><span class="text-[9px]">MATCH</span></button>
        </nav>
    </div>

    <!-- MODAL ADD MATCH -->
    <div id="modal-add" class="fixed inset-0 bg-black/60 z-[100000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold mb-6 text-center text-red-600 uppercase italic font-sans">Match Setup</h3>
            <form id="match-form" class="space-y-4 font-sans">
                <input type="text" name="title" placeholder="Title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold select-text" required>
                <div class="grid grid-cols-2 gap-3"><input type="number" name="fee" placeholder="Fee ৳" class="bg-gray-50 p-4 rounded-2xl outline-none" required><input type="number" name="prize" placeholder="Prize ৳" class="bg-gray-50 p-4 rounded-2xl outline-none" required></div>
                <div class="grid grid-cols-2 gap-3"><select name="map" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border-none"><option value="Bermuda">Bermuda</option><option value="Purgatory">Purgatory</option></select><select name="type" class="bg-gray-50 p-4 rounded-2xl outline-none font-bold text-gray-500 border-none"><option value="Solo">Solo</option><option value="Squad">Squad</option></select></div>
                <input type="text" name="releaseTime" placeholder="9:30 PM" class="w-full bg-gray-50 p-4 rounded-2xl outline-none" required>
                <div class="flex gap-3 pt-4"><button type="button" onclick="closeModal('modal-add')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-400">EXIT</button><button type="submit" class="flex-[2] nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">PUBLISH</button></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const OWNER_PIN = "yasin999";
        let banner64 = "";

        window.verifyPin = () => { if(document.getElementById('pin-input').value === OWNER_PIN) { localStorage.setItem('ba_auth_v25', 'true'); location.reload(); } else alert("Wrong PIN!"); };
        window.exitAdmin = () => { localStorage.removeItem('ba_auth_v25'); location.reload(); };

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                if(localStorage.getItem('ba_auth_v25') === 'true') { document.getElementById('app-body').classList.remove('hidden'); initEngine(); }
                else document.getElementById('pin-screen').classList.remove('hidden');
            }, 1800);
        });

        const langData = {
            en: { income: "Income", users: "Users", m_match: "Match", m_wallet: "Wallet", m_support: "Support", m_banner: "Banners", m_notif: "Notice", m_verify: "Verify" },
            bn: { income: "আয়", users: "ইউজার", m_match: "ম্যাচ", m_wallet: "ওয়ালেট", m_support: "সেবা", m_banner: "ব্যানার", m_notif: "নোটিশ", m_verify: "ভেরিফাই" }
        };

        function applyLang(lang) {
            const d = langData[lang] || langData.bn;
            document.getElementById('lbl-income').innerText = d.income; document.getElementById('lbl-users').innerText = d.users;
            document.getElementById('m-text-match').innerText = d.m_match; document.getElementById('m-text-wallet').innerText = d.m_wallet; document.getElementById('m-text-support').innerText = d.m_support;
            document.getElementById('m-text-banner').innerText = d.m_banner; document.getElementById('m-text-notif').innerText = d.m_notif; document.getElementById('m-text-verify').innerText = d.m_verify;
        }

        function initEngine() {
            onSnapshot(collection(db, "users"), s => document.getElementById('stat-users').innerText = s.size);
            onSnapshot(collection(db, "registrations"), s => {
                let cash = 0; s.forEach(d => { if(d.data().status === 'approved') cash += Number(d.data().fee || 0); });
                document.getElementById('stat-money').innerText = cash.toFixed(2);
            });
            onSnapshot(doc(db, "app_settings", "config"), d => {
                if(d.exists()) {
                    const c = d.data();
                    document.getElementById('set-nagad').value = c.nagad || "";
                    document.getElementById('set-bkash').value = c.bkash || "";
                    document.getElementById('set-rocket').value = c.rocket || "";
                    document.getElementById('set-lang').value = c.language || "bn";
                    applyLang(c.language || "bn");
                }
            });
            syncData();
        }

        function syncData() {
            // WALLET
            onSnapshot(collection(db, "wallet_requests"), snap => {
                const list = document.getElementById('wallet-list'); list.innerHTML = ''; let w = 0;
                snap.forEach(d => { const r = d.data(); if(r.status === 'pending') { w++; list.innerHTML += `<div class="bg-white p-5 rounded-[30px] card-shadow border-l-[10px] border-blue-500"><h4 class="font-bold text-gray-800 text-sm uppercase">${r.email}</h4><p class="text-sm font-black text-red-600 mt-1">৳${r.amount} | ${r.trxID || r.type}</p><div class="mt-4 flex gap-2"><button onclick="approveWallet('${d.id}', '${r.uid}', ${r.amount}, '${r.type}')" class="flex-1 nagad-gradient text-white py-2 rounded-xl font-bold text-[10px]">APPROVE</button><button onclick="delDoc('wallet_requests', '${d.id}')" class="flex-1 bg-gray-100 text-gray-400 py-2 rounded-xl font-bold text-[10px]">REJECT</button></div></div>`; } });
                document.getElementById('wallet-badge').innerText = w; document.getElementById('wallet-badge').style.display = w > 0 ? 'block' : 'none';
            });
            // SUPPORT
            onSnapshot(collection(db, "support_messages"), snap => {
                const list = document.getElementById('support-list'); list.innerHTML = ''; let u = 0;
                snap.forEach(d => { const m = d.data(); if(!m.adminReply) u++; list.innerHTML += `<div class="bg-white p-5 rounded-[30px] card-shadow border-l-[10px] ${m.adminReply ? 'border-gray-200' : 'border-green-500'}"><p class="text-[9px] font-bold text-gray-400 uppercase">${m.email}</p><p class="text-sm font-bold text-gray-800 mt-1 select-text">${m.message}</p>${m.adminReply ? `<p class="mt-2 text-xs text-blue-500 italic font-bold">Reply: ${m.adminReply}</p>` : `<button onclick="replyMsg('${d.id}')" class="mt-3 bg-green-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Reply</button>`}</div>`; });
                document.getElementById('support-badge').innerText = u; document.getElementById('support-badge').style.display = u > 0 ? 'block' : 'none';
            });
            // VERIFY
            onSnapshot(collection(db, "registrations"), snap => {
                const list = document.getElementById('verify-list'); list.innerHTML = ''; let v = 0;
                snap.forEach(d => { const r = d.data(); if(r.status === 'pending' && r.trxID !== 'WALLET_PAY') { v++; list.innerHTML += `<div class="bg-white p-5 rounded-[35px] card-shadow border-l-[12px] border-orange-500"><h4 class="font-bold text-gray-800 text-sm uppercase">Player: ${r.playerName}</h4><p class="text-[10px] font-bold text-blue-600 mt-1">UID: ${r.gameID} | Trx: ${r.trxID}</p><div class="mt-4 flex gap-2"><button onclick="updateDoc(doc(db,'registrations','${d.id}'),{status:'approved'})" class="flex-1 nagad-gradient text-white py-3 rounded-2xl font-bold text-[10px] uppercase shadow-md">Approve</button><button onclick="delDoc('registrations','${d.id}')" class="flex-1 bg-gray-50 text-gray-400 py-3 rounded-2xl font-bold text-[10px] uppercase"><i class="fas fa-trash"></i></button></div></div>`; } });
                document.getElementById('verify-badge').innerText = v; document.getElementById('verify-badge').style.display = v > 0 ? 'block' : 'none';
            });
            // MATCHES
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('match-list'); list.innerHTML = '';
                snap.forEach(d => { const m = d.data(); list.innerHTML += `<div class="bg-white p-5 rounded-[35px] card-shadow border-l-[12px] border-red-600 flex justify-between items-center"><div class="flex-1"><h4 class="font-bold text-gray-800 text-sm uppercase italic">${m.title}</h4><div class="mt-3 flex gap-2"><button onclick="releaseRoom('${d.id}')" class="bg-red-50 text-red-600 text-[10px] px-3 py-1.5 rounded-xl font-bold border border-red-100 uppercase">Room ID</button><button onclick="delDoc('matches','${d.id}')" class="bg-gray-50 text-gray-400 text-[10px] px-3 py-1.5 rounded-xl font-bold uppercase text-xs"><i class="fas fa-trash-alt"></i></button></div></div><span class="bg-green-100 text-green-600 text-[9px] font-black px-4 py-1.5 rounded-full uppercase">${m.status}</span></div>`; });
            });
            // Banner
            onSnapshot(collection(db, "banners"), s => { const l = document.getElementById('banner-list'); l.innerHTML = ''; s.forEach(d => l.innerHTML += `<div class="relative flex-shrink-0"><img src="${d.data().img}" class="w-48 h-28 object-cover rounded-[30px] border-4 border-white shadow-lg"><button onclick="delDoc('banners','${d.id}')" class="absolute -top-1 -right-1 bg-red-600 text-white w-7 h-7 rounded-full text-xs shadow-lg">×</button></div>`); });
        }

        window.approveWallet = async (id, uid, amount, type) => {
            const uSnap = await getDoc(doc(db, "users", uid));
            if(uSnap.exists()) {
                let bal = Number(uSnap.data().balance) || 0; if(type === 'deposit') bal += Number(amount);
                await updateDoc(doc(db, "users", uid), { balance: bal }); await updateDoc(doc(db, "wallet_requests", id), { status: 'approved' }); alert("Approved!");
                await addDoc(collection(db, "notifications"), { uid: uid, msg: `৳${amount} যোগ হয়েছে!`, createdAt: new Date().getTime() });
            }
        };

        window.saveAppSettings = async () => { await setDoc(doc(db, "app_settings", "config"), { nagad: document.getElementById('set-nagad').value, bkash: document.getElementById('set-bkash').value, rocket: document.getElementById('set-rocket').value, language: document.getElementById('set-lang').value }); alert("Saved!"); };
        window.replyMsg = async (id) => { const r = prompt("Reply:"); if(r) await updateDoc(doc(db, "support_messages", id), { adminReply: r }); };
        window.releaseRoom = async (id) => { const rid = prompt("Room ID:"); const rps = prompt("Pass:"); if(rid && rps) await updateDoc(doc(db, "matches", id), { roomID: rid, roomPass: rps, status: 'live' }); };
        window.previewImg = (e) => { const f = e.target.files[0]; const r = new FileReader(); r.onload = () => { banner64 = r.result; document.getElementById('upload-preview').innerHTML = `<img src="${banner64}" class="w-full h-full object-cover">`; document.getElementById('upload-btn').disabled = false; document.getElementById('upload-btn').classList.remove('opacity-50'); }; r.readAsDataURL(f); };
        window.uploadBannerAction = async () => { await addDoc(collection(db, "banners"), { img: banner64, createdAt: new Date() }); alert("Banner Live!"); location.reload(); };
        window.sendNotice = async () => { const m = document.getElementById('notif-text').value; if(m) { await addDoc(collection(db, "notifications"), { msg: m, createdAt: new Date().getTime() }); alert("Notice Sent!"); document.getElementById('notif-text').value=''; } };
        window.switchPage = (id) => { document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab')); document.getElementById('tab-'+id).classList.add('active-tab'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-red-600')); if(id === 'home') document.getElementById('nav-home').classList.add('text-red-600'); };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.delDoc = async (col, id) => { if(confirm("Are you sure?")) await deleteDoc(doc(db, col, id)); };

        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault(); const f = e.target;
            await addDoc(collection(db, "matches"), { title: f.title.value, fee: f.fee.value, prize: f.prize.value, map: f.map.value, type: f.type.value, releaseTime: f.releaseTime.value, status: 'open', roomID: '', roomPass: '', createdAt: new Date().getTime() });
            alert("Success!"); closeModal('modal-add'); f.reset();
        };
    </script>
</body>
</html>
