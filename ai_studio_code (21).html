<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleArena - Player Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        :root { --primary: #ff6b00; --bg: #05080f; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Poppins', sans-serif; }
        .gaming-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .orange-grad { background: linear-gradient(90deg, #ff6b00, #ff9e00); }
        .room-box { border: 2px dashed #ff6b00; background: rgba(255,107,0,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        // AUTH LOGIC
        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = e.target.email.value;
            const pass = e.target.password.value;
            const isLogin = document.getElementById('auth-btn').innerText === 'LOG IN';
            try {
                if(isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (err) { alert("Error: " + err.message); }
        };

        window.toggleAuth = () => {
            const btn = document.getElementById('auth-btn');
            const link = document.getElementById('auth-link');
            if(btn.innerText === 'LOG IN') {
                btn.innerText = 'SIGN UP';
                link.innerText = "Have an account? Log In";
            } else {
                btn.innerText = 'LOG IN';
                link.innerText = "New here? Register";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadMatches();
                loadMyMatches();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // LOAD MATCHES
        function loadMatches() {
            onSnapshot(query(collection(db, "matches"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('match-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `
                        <div class="glass rounded-3xl overflow-hidden mb-6">
                            <div class="p-4 bg-orange-600/20 flex justify-between">
                                <span class="gaming-font text-[10px] text-orange-500">${m.map} | ${m.type}</span>
                                <span class="text-[10px] opacity-60">${m.time}</span>
                            </div>
                            <div class="p-5">
                                <h3 class="text-xl font-bold gaming-font mb-4 text-white">${m.title}</h3>
                                <div class="grid grid-cols-3 gap-2 mb-5">
                                    <div class="text-center bg-white/5 p-2 rounded-xl">
                                        <p class="text-[9px] text-gray-400 uppercase tracking-tighter">Win Prize</p>
                                        <p class="text-sm font-bold text-green-400">৳${m.prize}</p>
                                    </div>
                                    <div class="text-center bg-white/5 p-2 rounded-xl border-x border-white/10">
                                        <p class="text-[9px] text-gray-400 uppercase tracking-tighter">Entry Fee</p>
                                        <p class="text-sm font-bold text-orange-500">৳${m.fee}</p>
                                    </div>
                                    <div class="text-center bg-white/5 p-2 rounded-xl">
                                        <p class="text-[9px] text-gray-400 uppercase tracking-tighter">Status</p>
                                        <p class="text-sm font-bold text-blue-400">${m.status}</p>
                                    </div>
                                </div>
                                <button onclick="openJoin('${d.id}', '${m.title}', '${m.fee}')" class="w-full orange-grad py-3 rounded-2xl font-bold gaming-font text-black">JOIN TOURNAMENT</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // JOIN LOGIC
        window.openJoin = (id, title, fee) => {
            document.getElementById('join-mid').value = id;
            document.getElementById('join-mtitle').value = title;
            document.getElementById('pay-fee').innerText = fee;
            document.getElementById('join-modal').classList.remove('hidden');
        };

        window.submitJoin = async (e) => {
            e.preventDefault();
            const data = {
                uid: currentUser.uid,
                matchID: e.target.matchID.value,
                matchTitle: e.target.matchTitle.value,
                playerName: e.target.pname.value,
                gameID: e.target.pguid.value,
                trxID: e.target.ptrx.value,
                status: 'pending'
            };
            await addDoc(collection(db, "registrations"), data);
            alert("Joined! Wait for admin to verify.");
            document.getElementById('join-modal').classList.add('hidden');
        };

        // LOAD MY MATCHES
        function loadMyMatches() {
            onSnapshot(query(collection(db, "registrations"), where("uid", "==", currentUser.uid)), (snap) => {
                const list = document.getElementById('my-list');
                list.innerHTML = '';
                snap.forEach(async (reg) => {
                    const r = reg.data();
                    let info = `<p class="text-xs text-yellow-500 mt-2">Status: Pending Verification...</p>`;
                    
                    if(r.status === 'approved') {
                        const mDoc = await getDoc(doc(db, "matches", r.matchID));
                        const mData = mDoc.data();
                        if(mData.roomID) {
                            info = `
                                <div class="mt-3 room-box p-3 rounded-xl">
                                    <p class="text-[10px] text-orange-500 font-bold">ROOM DETAILS READY</p>
                                    <p class="text-sm font-mono">ID: ${mData.roomID} | PASS: ${mData.roomPass}</p>
                                </div>`;
                        } else {
                            info = `<p class="text-xs text-green-500 mt-2 italic">Approved! Waiting for Room ID...</p>`;
                        }
                    }
                    list.innerHTML += `<div class="glass p-4 rounded-2xl mb-3"><h4 class="font-bold text-sm">${r.matchTitle}</h4>${info}</div>`;
                });
            });
        }

        window.showTab = (id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };
    </script>

    <!-- AUTH PAGE -->
    <div id="auth-page" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-bold gaming-font text-orange-500 mb-2">BattleArena</h1>
            <p class="text-xs text-gray-400 mb-8 tracking-widest uppercase">The Ultimate War</p>
            <form onsubmit="handleAuth(event)" class="space-y-4">
                <input type="email" name="email" placeholder="Email" class="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-white/5" required>
                <input type="password" name="password" placeholder="Password" class="w-full bg-slate-800 p-4 rounded-2xl outline-none border border-white/5" required>
                <button type="submit" id="auth-btn" class="w-full orange-grad py-4 rounded-2xl font-bold text-black gaming-font">LOG IN</button>
            </form>
            <p onclick="toggleAuth()" id="auth-link" class="mt-6 text-xs text-gray-500 underline cursor-pointer">New here? Register</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold gaming-font italic text-white">BattleArena</h2>
                <p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Player Dashboard</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-orange-600/20 flex items-center justify-center border border-orange-500/30">
                <i class="fas fa-user text-orange-500 text-sm"></i>
            </div>
        </header>

        <div class="p-6">
            <div id="tab-home" class="tab">
                <h3 class="text-sm font-bold mb-4 flex items-center"><span class="w-1 h-4 bg-orange-500 mr-2"></span> ACTIVE TOURNAMENTS</h3>
                <div id="match-list"></div>
            </div>

            <div id="tab-my" class="tab hidden">
                <h3 class="text-sm font-bold mb-4">MY PARTICIPATION</h3>
                <div id="my-list"></div>
            </div>

            <div id="tab-profile" class="tab hidden text-center pt-10">
                <div class="w-20 h-20 bg-orange-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">B</div>
                <h2 class="text-xl font-bold mb-1">PRO PLAYER</h2>
                <button onclick="signOut(auth)" class="mt-10 text-red-500 text-sm bg-red-500/10 px-6 py-2 rounded-full border border-red-500/20">LOGOUT ACCOUNT</button>
            </div>
        </div>

        <!-- NAV -->
        <nav class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around border-t border-white/5 rounded-t-3xl">
            <button onclick="showTab('tab-home')" class="flex flex-col items-center text-orange-500">
                <i class="fas fa-gamepad"></i><span class="text-[10px] mt-1">Play</span>
            </button>
            <button onclick="showTab('tab-my')" class="flex flex-col items-center text-gray-500">
                <i class="fas fa-medal"></i><span class="text-[10px] mt-1">Joined</span>
            </button>
            <button onclick="showTab('tab-profile')" class="flex flex-col items-center text-gray-500">
                <i class="fas fa-user"></i><span class="text-[10px] mt-1">Profile</span>
            </button>
        </nav>
    </div>

    <!-- MODAL -->
    <div id="join-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6 hidden">
        <div class="glass p-6 rounded-3xl w-full max-w-sm border-t-4 border-orange-500">
            <h3 class="font-bold gaming-font mb-2">JOIN MATCH</h3>
            <p class="text-[10px] text-gray-400 mb-4 uppercase">Pay ৳<span id="pay-fee">0</span> to: 017XXXXXXXX (Bkash Personal)</p>
            <form onsubmit="submitJoin(event)" class="space-y-3">
                <input type="hidden" name="matchID" id="join-mid">
                <input type="hidden" name="matchTitle" id="join-mtitle">
                <input type="text" name="pname" placeholder="Game Nickname" class="w-full bg-slate-800 p-3 rounded-xl text-sm outline-none" required>
                <input type="text" name="pguid" placeholder="Game UID" class="w-full bg-slate-800 p-3 rounded-xl text-sm outline-none" required>
                <input type="text" name="ptrx" placeholder="Transaction ID (TrxID)" class="w-full bg-slate-800 p-3 rounded-xl text-sm outline-none" required>
                <div class="flex gap-2">
                    <button type="button" onclick="document.getElementById('join-modal').classList.add('hidden')" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">BACK</button>
                    <button type="submit" class="flex-[2] orange-grad py-3 rounded-xl font-bold text-black">CONFIRM JOIN</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
