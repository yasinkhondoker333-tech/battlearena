<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena Pro - Player Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0; }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        input, textarea, .select-text { -webkit-user-select: text !important; user-select: text !important; }
        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        #loader { position: fixed; inset: 0; background: white; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid var(--nagad-red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #slider-container { width: 100%; overflow: hidden; border-radius: 30px; position: relative; height: 160px; background: #eee; }
        #banner-slider { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .banner-slide { min-width: 100%; height: 100%; object-fit: cover; }

        .tab-page { display: none; animation: slideUp 0.4s ease; }
        .active-tab { display: block !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        iframe, .appsgeyser-side-menu, #side-bar, .appsgeyser-arrow { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader"><div class="ring"></div><h1 class="mt-4 text-3xl font-black text-red-600 italic tracking-tighter uppercase font-sans">BattleArena</h1><p id="loading-text" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Connecting...</p></div>

    <!-- NOTIFICATION MODAL (নোটিশ পপ-আপ) -->
    <div id="notif-modal" class="fixed top-6 left-6 right-6 bg-yellow-400 p-5 rounded-[30px] shadow-2xl z-[15000] hidden border-b-4 border-red-600">
        <div class="flex items-center gap-4">
            <i class="fas fa-bullhorn text-2xl text-red-700 animate-bounce"></i>
            <div class="flex-1">
                <h4 class="font-black text-red-800 text-[10px] uppercase italic">Breaking News!</h4>
                <p id="notif-msg" class="text-[12px] text-red-900 font-bold leading-tight mt-1"></p>
            </div>
            <button onclick="document.getElementById('notif-modal').style.display='none'" class="text-red-900 bg-white/20 p-2 rounded-full"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="hidden fixed inset-0 bg-white z-[9000] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 nagad-gradient rounded-[25px] flex items-center justify-center mb-6 shadow-xl"><i class="fas fa-gamepad text-4xl text-white"></i></div>
        <h2 id="auth-title" class="text-2xl font-bold text-gray-800 mb-2 font-sans text-center uppercase italic">Player Access</h2>
        <form onsubmit="handleAuth(event)" class="w-full max-w-sm space-y-4">
            <input type="email" id="auth-email" placeholder="ইমেইল এড্রেস" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none select-text" required>
            <input type="password" id="auth-pass" placeholder="পাসওয়ার্ড" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none select-text" required>
            <button type="submit" id="auth-btn" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase tracking-wider">লগ ইন</button>
        </form>
        <p onclick="toggleAuth()" id="auth-toggle" class="mt-6 text-sm text-red-600 font-bold cursor-pointer underline uppercase text-center font-sans">New Here? Sign Up</p>
    </div>

    <!-- MAIN APP AREA -->
    <div id="app-body" class="hidden min-h-screen pb-32">
        <header class="nagad-gradient p-6 pb-28 text-white sticky top-0 z-50 rounded-b-[50px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-initial" class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold border border-white/30 shadow-inner uppercase">U</div>
                    <div><h2 class="font-black text-lg leading-tight uppercase font-sans tracking-tighter">PLAYER</h2><p class="text-[10px] opacity-90 font-black text-yellow-300 uppercase tracking-widest italic" id="user-name-ui">YASIN</p></div>
                </div>
                <button onclick="logoutUser()" class="bg-white/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-white/10 active:bg-red-800 transition shadow-lg"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="mt-8 flex justify-between items-end">
                <div><p class="text-[10px] uppercase font-bold opacity-70 mb-1" id="lbl-balance">My Balance</p><h3 class="text-3xl font-bold italic font-sans">৳ <span id="balance-display">0.00</span></h3></div>
                <button onclick="openModal('modal-add-money')" class="bg-yellow-400 text-red-700 px-5 py-2 rounded-full text-[11px] font-black uppercase shadow-lg active:scale-90 transition">Add Money</button>
            </div>
        </header>

        <main class="px-5 -mt-16 relative z-[600]">
            <!-- Dynamic Banner Slider -->
            <div class="bg-white rounded-[35px] p-2 card-shadow mb-6 border border-gray-50 overflow-hidden"><div id="slider-container"><div id="banner-slider"></div></div></div>

            <div id="tab-home" class="tab-page active-tab"><h3 class="font-bold text-gray-800 text-lg mb-5 px-2 font-sans italic" id="lbl-matches">ACTIVE TOURNAMENTS</h3><div id="match-list" class="space-y-6"></div></div>
            <div id="tab-joined" class="tab-page"><h3 class="font-bold text-gray-800 text-lg mb-5 px-2 uppercase tracking-widest" id="lbl-my-joined">Participated</h3><div id="my-matches-list" class="space-y-4"></div></div>
            <div id="tab-support" class="tab-page">
                <div class="bg-white p-8 rounded-[40px] card-shadow border border-gray-50 text-center">
                    <h2 class="text-xl font-bold text-gray-800 uppercase mb-4 italic" id="lbl-support-title">Support (সেবা)</h2>
                    <textarea id="support-msg" rows="4" placeholder="আপনার সমস্যাটি লিখুন..." class="w-full bg-gray-50 p-5 rounded-3xl outline-none border border-gray-100 text-sm mb-4 select-text"></textarea>
                    <button onclick="sendSupportMsg()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">Send Message</button>
                    <div id="support-history" class="mt-8 text-left space-y-4"></div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[2000] rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="switchPage('home')" id="nav-home" class="nav-icon text-red-600 flex flex-col items-center font-bold font-sans"><i class="fas fa-home text-xl"></i><span class="text-[9px]" id="nav-h">HOME</span></button>
            <button onclick="switchPage('joined')" id="nav-joined" class="nav-icon text-gray-300 flex flex-col items-center font-bold font-sans"><i class="fas fa-trophy text-xl"></i><span class="text-[9px]" id="nav-m">MATCH</span></button>
            <button onclick="switchPage('support')" id="nav-support" class="nav-icon text-gray-300 flex flex-col items-center font-bold font-sans"><i class="fas fa-headset text-xl"></i><span class="text-[9px]" id="nav-s">SEBA</span></button>
        </nav>
    </div>

    <!-- MODAL: ADD MONEY -->
    <div id="modal-add-money" class="fixed inset-0 bg-black/60 z-[10000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl text-center overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-black text-red-600 uppercase mb-6 italic tracking-widest font-sans">Payment Info</h3>
            <div class="space-y-3 mb-6 text-sans text-xs">
                <div id="box-nagad" class="bg-red-50 p-4 rounded-2xl text-left border-l-8 border-red-500 hidden font-bold italic"><p class="text-red-600 uppercase">Nagad</p><p class="text-gray-800 select-text text-base" id="val-nagad"></p></div>
                <div id="box-bkash" class="bg-orange-50 p-4 rounded-2xl text-left border-l-8 border-orange-500 hidden font-bold italic"><p class="text-orange-600 uppercase">Bkash</p><p class="text-gray-800 select-text text-base" id="val-bkash"></p></div>
                <div id="box-rocket" class="bg-blue-50 p-4 rounded-2xl text-left border-l-8 border-blue-500 hidden font-bold italic"><p class="text-blue-600 uppercase">Rocket</p><p class="text-gray-800 select-text text-base" id="val-rocket"></p></div>
            </div>
            <form id="money-form" onsubmit="handleMoneyRequest(event)">
                <input type="number" id="money-amt" placeholder="৳ কত টাকা পাঠিয়েছেন?" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none font-bold select-text mb-3" required>
                <input type="text" id="money-trx" placeholder="Transaction ID (TrxID)" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none font-bold select-text mb-4" required>
                <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase italic font-sans">Submit Request</button>
            </form>
            <button onclick="closeModal('modal-add-money')" class="mt-5 text-xs text-gray-400 font-bold uppercase underline">Cancel</button>
        </div>
    </div>

    <!-- MODAL: JOIN (Fixed Joining Form) -->
    <div id="modal-join" class="fixed inset-0 bg-black/60 z-[10000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl text-center">
            <h3 class="text-xl font-bold text-red-600 mb-6 uppercase italic tracking-widest font-sans">Tournament Entry</h3>
            <div id="join-wallet" class="mb-4 bg-green-50 p-4 rounded-3xl border border-green-100">
                <p class="text-[10px] font-bold text-green-600 uppercase">Your Wallet: ৳<span id="can-pay">0.00</span></p>
                <button onclick="payByWallet()" class="mt-2 text-xs font-black text-red-600 underline uppercase italic font-sans">Use Wallet Balance</button>
            </div>
            <p class="text-[10px] text-gray-300 uppercase mb-4 italic font-bold">--- OR MANUAL PAY ---</p>
            <form id="join-form" onsubmit="handleJoinMatch(event)">
                <input type="hidden" id="join-match-id"><input type="hidden" id="join-match-fee"><input type="hidden" id="join-match-title">
                <input type="text" id="join-pname" placeholder="Free Fire Nickname" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold mb-2" required>
                <input type="text" id="join-puid" placeholder="Player ID (UID)" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold mb-2" required>
                <input type="text" id="join-ptrx" placeholder="Manual Pay TrxID" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold mb-4" required>
                <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg mt-2 uppercase tracking-widest italic">Confirm Join</button>
            </form>
            <button onclick="closeModal('modal-join')" class="mt-4 text-xs text-gray-400 font-bold uppercase underline">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;
        let userData = { balance: 0 };

        const langMap = {
            bn: { loading: "লোড হচ্ছে...", h: "হোম", m: "ম্যাচ", s: "সেবা", bal: "ব্যালেন্স", add: "টাকা যোগ", support: "সেবা (Support)", matches: "টুর্নামেন্ট", joined: "অংশগ্রহণকৃত" },
            en: { loading: "Connecting...", h: "HOME", m: "MATCH", s: "SUPPORT", bal: "Balance", add: "Add Money", support: "Support Box", matches: "Active Matches", joined: "Participated" }
        };

        function applyLang(lang) {
            const d = langMap[lang] || langMap.bn;
            document.getElementById('loading-text').innerText = d.loading;
            document.getElementById('nav-h').innerText = d.h; document.getElementById('nav-m').innerText = d.m; document.getElementById('nav-s').innerText = d.s;
            document.getElementById('lbl-balance').innerText = d.bal; document.getElementById('lbl-support-title').innerText = d.support;
            document.getElementById('lbl-active-matches').innerText = d.matches; document.getElementById('lbl-my-joined').innerText = d.joined;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                onAuthStateChanged(auth, user => {
                    if (user) { currentUser = user; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-body').classList.remove('hidden'); initEngine(); }
                    else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('app-body').classList.add('hidden'); }
                });
            }, 2000);
        });

        function initEngine() {
            // ১. অ্যাডমিন সেটিংস ও নম্বর
            onSnapshot(doc(db, "app_settings", "config"), d => {
                if(d.exists()) {
                    const c = d.data(); applyLang(c.language || "bn");
                    if(c.nagad) { document.getElementById('val-nagad').innerText = c.nagad; document.getElementById('box-nagad').classList.remove('hidden'); }
                    if(c.bkash) { document.getElementById('val-bkash').innerText = c.bkash; document.getElementById('box-bkash').classList.remove('hidden'); }
                    if(c.rocket) { document.getElementById('val-rocket').innerText = c.rocket; document.getElementById('box-rocket').classList.remove('hidden'); }
                }
            });

            // ২. ব্যালেন্স সিঙ্ক
            onSnapshot(doc(db, "users", currentUser.uid), d => {
                if(d.exists()) {
                    userData = d.data(); const b = parseFloat(userData.balance || 0).toFixed(2);
                    document.getElementById('balance-display').innerText = b; document.getElementById('can-pay').innerText = b;
                }
            });

            syncMatches(); syncMyMatches(); syncBanners(); syncSupport();
            
            // ৩. নোটিশ সিঙ্ক
            onSnapshot(query(collection(db, "global_notifications"), orderBy("timestamp", "desc")), s => {
                if(!s.empty) { const n = s.docs[0].data(); document.getElementById('notif-msg').innerText = n.msg; document.getElementById('notif-modal').style.display = 'block'; }
            });
        }

        // --- জয়েন ফাংশন ফিক্স ---
        window.openJoinForm = (id, title, fee) => {
            document.getElementById('join-match-id').value = id; document.getElementById('join-match-fee').value = fee;
            document.getElementById('join-match-title').value = title; openModal('modal-join');
        };

        window.payByWallet = async () => {
            const fee = Number(document.getElementById('join-match-fee').value);
            if(userData.balance < fee) return alert("Wallet balance low!");
            const n = prompt("Free Fire Nickname:"); const u = prompt("UID:"); if(!n || !u) return;
            await addDoc(collection(db, "registrations"), { uid: currentUser.uid, matchID: document.getElementById('join-match-id').value, matchTitle: document.getElementById('join-match-title').value, playerName: n, gameID: u, trxID: "WALLET_PAY", fee: fee, status: 'approved', timestamp: new Date().getTime() });
            await updateDoc(doc(db, "users", currentUser.uid), { balance: userData.balance - fee });
            alert("Success!"); closeModal('modal-join');
        };

        function syncMatches() {
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('match-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    if(m.status !== 'completed') {
                        list.innerHTML += `<div class="bg-white p-6 rounded-[40px] card-shadow border border-gray-50 overflow-hidden relative"><div class="flex justify-between mb-4 font-sans"><span class="bg-red-50 text-red-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase">${m.map} | ${m.type}</span><span class="text-[10px] font-black text-gray-300 italic">${m.releaseTime}</span></div><h3 class="text-xl font-bold text-gray-800 uppercase mb-5 italic tracking-tighter">${m.title}</h3><div class="grid grid-cols-3 gap-2 mb-6 text-center font-sans"><div class="bg-gray-50 p-3 rounded-3xl"><p class="text-[8px] text-gray-400 font-bold uppercase">Prize</p><p class="text-sm font-black text-green-600">৳${m.prize}</p></div><div class="bg-gray-50 p-3 rounded-3xl border-x border-white"><p class="text-[8px] text-gray-400 font-bold uppercase">Entry</p><p class="text-sm font-black text-red-600">৳${m.fee}</p></div><div class="bg-gray-50 p-3 rounded-3xl"><p class="text-[8px] text-gray-400 font-bold uppercase">Status</p><p class="text-sm font-black text-blue-600 uppercase font-sans">${m.status}</p></div></div><button onclick="openJoinForm('${d.id}', '${m.title}', ${m.fee})" class="w-full nagad-gradient text-white py-4 rounded-3xl font-bold shadow-lg uppercase text-xs tracking-widest italic">Join Match Now</button></div>`;
                    }
                });
            });
        }

        function syncMyMatches() {
            onSnapshot(query(collection(db, "registrations"), where("uid", "==", currentUser.uid)), async snap => {
                const list = document.getElementById('my-matches-list'); list.innerHTML = '';
                for(let d of snap.docs) {
                    const r = d.data(); const mSnap = await getDoc(doc(db, "matches", r.matchID));
                    if(!mSnap.exists()) continue;
                    const m = mSnap.data();
                    let sb = `<div class="mt-3 bg-orange-50 text-orange-600 text-[10px] p-3 rounded-2xl font-bold text-center uppercase tracking-widest italic font-sans">Wait for Approval</div>`;
                    if(r.status === 'approved') {
                        if(m.status === 'live') sb = `<div class="mt-3 bg-green-50 p-4 rounded-[30px] border-2 border-dashed border-green-200 text-center font-mono font-bold text-sm select-text font-sans">ID: ${m.roomID} | PS: ${m.roomPass}</div>`;
                        else sb = `<div class="mt-3 bg-blue-50 text-blue-600 text-[10px] p-3 rounded-2xl font-bold text-center uppercase italic font-black font-sans">Wait for Room Info</div>`;
                    }
                    list.innerHTML += `<div class="bg-white p-5 rounded-[40px] card-shadow border border-gray-50"><h4 class="font-bold text-gray-800 text-sm uppercase italic font-sans">${m.title}</h4><p class="text-[9px] text-gray-400 font-bold uppercase mt-1 font-sans">Player: ${r.playerName}</p>${sb}</div>`;
                }
            });
        }

        function syncBanners() {
            onSnapshot(collection(db, "banners"), s => {
                const slider = document.getElementById('banner-slider'); slider.innerHTML = '';
                if(s.empty) { slider.innerHTML = `<img src="https://via.placeholder.com/600x250/e61d2b/ffffff?text=Welcome+To+BattleArena" class="banner-slide">`; return; }
                s.forEach(d => slider.innerHTML += `<img src="${d.data().img}" class="banner-slide">`);
                let i=0; if(s.size > 1) setInterval(() => { i++; if(i >= s.size) i = 0; slider.style.transform = `translateX(-${i * 100}%)`; }, 4500);
            });
        }

        function syncSupport() {
            onSnapshot(query(collection(db, "support_messages"), where("uid", "==", currentUser.uid)), s => {
                const l = document.getElementById('support-history'); l.innerHTML = '';
                s.forEach(d => { const m = d.data(); l.innerHTML += `<div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 mb-2"><p class="text-xs font-bold text-gray-800 font-sans">Me: ${m.message}</p>${m.adminReply ? `<p class="text-xs text-red-600 font-bold mt-2 italic font-sans">Admin: ${m.adminReply}</p>` : ''}</div>`; });
            });
        }

        window.handleJoinMatch = async (e) => { e.preventDefault(); await addDoc(collection(db, "registrations"), { uid: currentUser.uid, matchID: document.getElementById('join-match-id').value, matchTitle: document.getElementById('join-match-title').value, playerName: document.getElementById('join-pname').value, gameID: document.getElementById('join-puid').value, trxID: document.getElementById('join-ptrx').value, fee: document.getElementById('join-match-fee').value, status: 'pending', timestamp: new Date().getTime() }); alert("Sent!"); closeModal('modal-join'); };
        window.submitMoneyRequest = async (e) => { e.preventDefault(); await addDoc(collection(db, "wallet_requests"), { uid: currentUser.uid, email: currentUser.email, amount: document.getElementById('money-amt').value, trxID: document.getElementById('money-trx').value, type: 'deposit', status: 'pending', timestamp: new Date().getTime() }); alert("Sent!"); closeModal('modal-add-money'); };
        window.sendSupportMsg = async () => { const m = document.getElementById('support-msg').value; if(m) { await addDoc(collection(db, "support_messages"), { uid: currentUser.uid, email: currentUser.email, message: m, adminReply: "", timestamp: new Date().getTime() }); document.getElementById('support-msg').value = ''; alert("Sent!"); } };

        window.handleAuth = async (e) => { e.preventDefault(); const em = document.getElementById('auth-email').value; const ps = document.getElementById('auth-pass').value; const isL = document.getElementById('auth-btn').innerText === ' Access Account' || document.getElementById('auth-btn').innerText === 'লগ ইন'; try { if(isL) await signInWithEmailAndPassword(auth, em, ps); else { const res = await createUserWithEmailAndPassword(auth, em, ps); await setDoc(doc(db, "users", res.user.uid), { email: em, balance: 0, createdAt: new Date() }); } } catch (err) { alert(err.message); } };
        window.toggleAuth = () => { const b = document.getElementById('auth-btn'); b.innerText = (b.innerText === ' Access Account' || b.innerText === 'লগ ইন') ? 'Sign Up' : ' Access Account'; };
        window.switchPage = (id) => { document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab')); document.getElementById('tab-'+id).classList.add('active-tab'); document.querySelectorAll('.nav-icon').forEach(n => n.classList.replace('text-red-600', 'text-gray-300')); document.getElementById('nav-'+id).classList.replace('text-gray-300', 'text-red-600'); };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.logoutUser = () => signOut(auth);
    </script>
</body>
</html>
