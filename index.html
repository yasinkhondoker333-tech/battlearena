<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BattleArena Pro - Player Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root { --nagad-red: #e61d2b; --nagad-orange: #f97316; }
        body { background-color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0; }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        input, textarea, .select-text { -webkit-user-select: text !important; user-select: text !important; }
        .nagad-gradient { background: linear-gradient(135deg, #e61d2b 0%, #ff4d4d 100%); }
        .card-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #loader { position: fixed; inset: 0; background: white; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ring { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--nagad-red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #banner-slider { display: flex; transition: transform 0.5s ease-in-out; }
        .banner-slide { min-width: 100%; height: 160px; object-fit: cover; border-radius: 30px; }
        .tab-page { display: none; animation: slideUp 0.4s ease; }
        .active-tab { display: block !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        iframe, .appsgeyser-side-menu, #side-bar, .appsgeyser-arrow { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader"><div class="loader-ring"></div><h1 class="mt-4 text-3xl font-black text-red-600 italic tracking-tighter uppercase font-sans">BattleArena</h1><p id="loading-text" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Connecting...</p></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="hidden fixed inset-0 bg-white z-[9000] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 nagad-gradient rounded-[25px] flex items-center justify-center mb-6 shadow-xl"><i class="fas fa-gamepad text-4xl text-white"></i></div>
        <h2 id="auth-title" class="text-2xl font-bold text-gray-800 mb-2">Player Login</h2>
        <form onsubmit="handleAuth(event)" class="w-full max-w-sm space-y-4">
            <input type="email" id="auth-email" placeholder="ইমেইল এড্রেস" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none select-text" required>
            <input type="password" id="auth-pass" placeholder="পাসওয়ার্ড" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none select-text" required>
            <button type="submit" id="auth-btn" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">লগ ইন</button>
        </form>
        <p onclick="toggleAuth()" id="auth-toggle" class="mt-6 text-sm text-red-600 font-bold cursor-pointer underline">নতুন অ্যাকাউন্ট তৈরি করুন</p>
    </div>

    <!-- MAIN APP AREA -->
    <div id="app-body" class="hidden min-h-screen pb-32">
        <header class="nagad-gradient p-6 pb-28 text-white sticky top-0 z-50 rounded-b-[50px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-initial" class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold border border-white/30 shadow-inner">U</div>
                    <div><h2 class="font-bold text-lg leading-tight uppercase" id="user-name">Player</h2><p class="text-[10px] opacity-80 font-bold text-yellow-300" id="user-status">Verified Member</p></div>
                </div>
                <button onclick="logoutUser()" class="bg-white/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-white/10"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="mt-8 flex justify-between items-end">
                <div><p class="text-[10px] uppercase font-bold opacity-70 mb-1" id="lbl-balance">My Balance</p><h3 class="text-3xl font-bold italic">৳ <span id="balance-display">0.00</span></h3></div>
                <button onclick="openModal('modal-add-money')" class="bg-yellow-400 text-red-700 px-5 py-2 rounded-full text-[11px] font-black uppercase shadow-lg" id="btn-add-money">Add Money</button>
            </div>
        </header>

        <main class="px-5 -mt-16 relative z-[600]">
            <!-- BANNER SLIDER -->
            <div class="bg-white rounded-[35px] p-2 card-shadow mb-6 border border-gray-50 overflow-hidden"><div id="slider-wrapper" class="overflow-hidden rounded-[30px]"><div id="banner-slider"></div></div></div>

            <!-- TABS -->
            <div id="tab-home" class="tab-page active-tab"><h3 class="font-bold text-gray-800 text-lg mb-5 px-2" id="lbl-matches">Active Matches</h3><div id="match-list" class="space-y-6"></div></div>
            <div id="tab-joined" class="tab-page"><h3 class="font-bold text-gray-800 text-lg mb-5 px-2" id="lbl-joined">Participated</h3><div id="my-matches-list" class="space-y-4"></div></div>
            <div id="tab-support" class="tab-page">
                <div class="bg-white p-8 rounded-[40px] card-shadow text-center border border-gray-50">
                    <h2 class="text-xl font-bold text-gray-800 uppercase mb-4" id="lbl-support">সেবা (Support)</h2>
                    <textarea id="support-msg" rows="4" placeholder="আপনার সমস্যাটি লিখুন..." class="w-full bg-gray-50 p-5 rounded-3xl outline-none border border-gray-100 text-sm mb-4 select-text"></textarea>
                    <button onclick="sendSupportMsg()" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold" id="btn-support-send">বার্তা পাঠান</button>
                    <div id="support-history" class="mt-8 text-left space-y-4"></div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[2000] rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="switchPage('home')" id="nav-home" class="nav-icon text-red-600 flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold" id="nav-lbl-home">HOME</span></button>
            <button onclick="switchPage('joined')" id="nav-joined" class="nav-icon text-gray-300 flex flex-col items-center"><i class="fas fa-trophy text-xl"></i><span class="text-[9px] font-bold" id="nav-lbl-match">MATCH</span></button>
            <button onclick="switchPage('support')" id="nav-support" class="nav-icon text-gray-300 flex flex-col items-center"><i class="fas fa-headset text-xl"></i><span class="text-[9px] font-bold" id="nav-lbl-seba">SEBA</span></button>
        </nav>
    </div>

    <!-- MODAL: ADD MONEY (3 Numbers) -->
    <div id="modal-add-money" class="fixed inset-0 bg-black/60 z-[10000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl text-center overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold text-red-600 uppercase mb-6" id="lbl-add-money-title">Add Money</h3>
            <div class="space-y-3 mb-6">
                <div id="nagad-box" class="bg-gray-50 p-3 rounded-2xl text-left border-l-4 border-red-500 hidden"><p class="text-[9px] font-bold text-gray-400 uppercase">Nagad</p><p class="text-sm font-black text-gray-800 select-text" id="num-nagad"></p></div>
                <div id="bkash-box" class="bg-gray-50 p-3 rounded-2xl text-left border-l-4 border-orange-500 hidden"><p class="text-[9px] font-bold text-gray-400 uppercase">Bkash</p><p class="text-sm font-black text-gray-800 select-text" id="num-bkash"></p></div>
                <div id="rocket-box" class="bg-gray-50 p-3 rounded-2xl text-left border-l-4 border-blue-500 hidden"><p class="text-[9px] font-bold text-gray-400 uppercase">Rocket</p><p class="text-sm font-black text-gray-800 select-text" id="num-rocket"></p></div>
            </div>
            <form id="money-form" class="space-y-3">
                <input type="number" id="money-amt" placeholder="৳ Amount" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none font-bold select-text" required>
                <input type="text" id="money-trx" placeholder="TrxID / Number" class="w-full bg-gray-50 p-4 rounded-2xl border border-gray-100 outline-none font-bold select-text" required>
                <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg uppercase" id="btn-submit-money">Submit Request</button>
            </form>
            <button onclick="closeModal('modal-add-money')" class="mt-4 text-xs text-gray-400 font-bold uppercase">Back</button>
        </div>
    </div>

    <!-- MODAL: JOIN MATCH -->
    <div id="modal-join" class="fixed inset-0 bg-black/60 z-[10000] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-8 shadow-2xl text-center">
            <h3 class="text-xl font-bold text-red-600 mb-6 uppercase italic">Entry Details</h3>
            <div id="join-wallet" class="mb-4 bg-green-50 p-4 rounded-3xl border border-green-100">
                <p class="text-[10px] font-bold text-green-600 uppercase">Your Balance: ৳<span id="can-pay">0.00</span></p>
                <button id="btn-pay-wallet" class="mt-2 text-xs font-black text-red-600 underline uppercase italic">Pay with Wallet</button>
            </div>
            <p class="text-[10px] text-gray-300 uppercase mb-4 tracking-widest">--- Or Manual Pay ---</p>
            <form id="join-form" class="space-y-3">
                <input type="hidden" id="join-match-id"><input type="hidden" id="join-match-fee">
                <input type="text" id="join-pname" placeholder="Nickname" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold" required>
                <input type="text" id="join-puid" placeholder="UID" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold" required>
                <input type="text" id="join-ptrx" placeholder="Manual TrxID" class="w-full bg-gray-50 p-3 rounded-xl outline-none select-text border border-gray-100 font-bold" required>
                <button type="submit" class="w-full nagad-gradient text-white py-4 rounded-2xl font-bold shadow-lg">CONFIRM JOIN</button>
            </form>
            <button onclick="closeModal('modal-join')" class="mt-4 text-xs text-gray-400 font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUHOA9iEYJGpkuRWgjCg8L00sQpW-36sk",
            authDomain: "yk-tournament-719d3.firebaseapp.com",
            projectId: "yk-tournament-719d3",
            storageBucket: "yk-tournament-719d3.firebasestorage.app",
            messagingSenderId: "489185516491",
            appId: "1:489185516491:web:a12f64894cb05e1467344e",
            measurementId: "G-N3HSR1VPF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;
        let userData = { balance: 0 };

        const langMap = {
            bn: { loading: "লোড হচ্ছে...", home: "হোম", match: "ম্যাচ", seba: "সেবা", prof: "অ্যাকাউন্ট", bal: "ব্যালেন্স", add: "টাকা যোগ", support: "সেবা (Support)", matches: "টুর্নামেন্ট", joined: "অংশগ্রহণকৃত", logout: "লগ আউট" },
            en: { loading: "Connecting...", home: "HOME", match: "MATCH", seba: "SUPPORT", prof: "PROFILE", bal: "Balance", add: "Add Money", support: "Support Box", matches: "Active Matches", joined: "Joined", logout: "Logout" }
        };

        function applyLang(lang) {
            const d = langMap[lang] || langMap.bn;
            document.getElementById('loading-text').innerText = d.loading;
            document.getElementById('nav-lbl-home').innerText = d.home;
            document.getElementById('nav-lbl-match').innerText = d.match;
            document.getElementById('nav-lbl-seba').innerText = d.seba;
            document.getElementById('lbl-balance').innerText = d.bal;
            document.getElementById('btn-add-money').innerText = d.add;
            document.getElementById('lbl-support').innerText = d.support;
            document.getElementById('lbl-matches').innerText = d.matches;
            document.getElementById('lbl-joined').innerText = d.joined;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                onAuthStateChanged(auth, user => {
                    if (user) { currentUser = user; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-body').classList.remove('hidden'); initEngine(); }
                    else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('app-body').classList.add('hidden'); }
                });
            }, 2000);
        });

        function initEngine() {
            // Language & Numbers Sync
            onSnapshot(doc(db, "app_settings", "config"), d => {
                if(d.exists()) {
                    const c = d.data();
                    applyLang(c.language || "bn");
                    if(c.nagad) { document.getElementById('num-nagad').innerText = c.nagad; document.getElementById('nagad-box').classList.remove('hidden'); }
                    if(c.bkash) { document.getElementById('num-bkash').innerText = c.bkash; document.getElementById('bkash-box').classList.remove('hidden'); }
                    if(c.rocket) { document.getElementById('num-rocket').innerText = c.rocket; document.getElementById('rocket-box').classList.remove('hidden'); }
                }
            });

            // User Balance Sync
            onSnapshot(doc(db, "users", currentUser.uid), d => {
                if(d.exists()) {
                    userData = d.data();
                    const b = parseFloat(userData.balance || 0).toFixed(2);
                    document.getElementById('balance-display').innerText = b;
                    document.getElementById('can-pay').innerText = b;
                    document.getElementById('user-name').innerText = userData.email.split('@')[0];
                }
            });

            syncEverything();
        }

        function syncEverything() {
            // MATCHES
            onSnapshot(collection(db, "matches"), snap => {
                const list = document.getElementById('match-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    if(m.status !== 'completed') {
                        list.innerHTML += `<div class="bg-white p-6 rounded-[40px] card-shadow border border-gray-50"><div class="flex justify-between mb-4"><span class="bg-red-50 text-red-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase">${m.map} | ${m.type}</span><span class="text-[10px] font-black text-gray-300">${m.releaseTime}</span></div><h3 class="text-xl font-bold text-gray-800 uppercase mb-5 italic">${m.title}</h3><div class="grid grid-cols-3 gap-2 mb-6"><div class="bg-gray-50 p-3 rounded-3xl text-center"><p class="text-[8px] text-gray-400 font-bold uppercase">Prize</p><p class="text-sm font-black text-green-600">৳${m.prize}</p></div><div class="bg-gray-50 p-3 rounded-3xl text-center"><p class="text-[8px] text-gray-400 font-bold uppercase">Entry</p><p class="text-sm font-black text-red-600">৳${m.fee}</p></div><div class="bg-gray-50 p-3 rounded-3xl text-center"><p class="text-[8px] text-gray-400 font-bold uppercase">Status</p><p class="text-sm font-black text-blue-600 uppercase">${m.status}</p></div></div><button onclick="openJoinModal('${d.id}', ${m.fee})" class="w-full nagad-gradient text-white py-4 rounded-3xl font-bold shadow-lg uppercase text-xs tracking-widest">Join Match</button></div>`;
                    }
                });
            });

            // MY MATCHES (Room ID Logic)
            onSnapshot(query(collection(db, "registrations"), where("uid", "==", currentUser.uid)), async snap => {
                const list = document.getElementById('my-matches-list'); list.innerHTML = '';
                for(let d of snap.docs) {
                    const r = d.data(); const mSnap = await getDoc(doc(db, "matches", r.matchID));
                    if(!mSnap.exists()) continue;
                    const m = mSnap.data();
                    let sb = `<div class="mt-3 bg-orange-50 text-orange-600 text-[10px] p-3 rounded-2xl font-bold text-center uppercase tracking-widest">Wait for Approval</div>`;
                    if(r.status === 'approved') {
                        if(m.status === 'live') sb = `<div class="mt-3 bg-green-50 p-4 rounded-[30px] border-2 border-dashed border-green-200 text-center font-mono font-bold text-sm select-text">ID: ${m.roomID} | PS: ${m.roomPass}</div>`;
                        else sb = `<div class="mt-3 bg-blue-50 text-blue-600 text-[10px] p-3 rounded-2xl font-bold text-center uppercase font-black italic tracking-widest">Match starting soon...</div>`;
                    }
                    list.innerHTML += `<div class="bg-white p-5 rounded-[40px] card-shadow border border-gray-50"><h4 class="font-bold text-gray-800 text-sm uppercase italic">${m.title}</h4><p class="text-[9px] text-gray-400 font-bold uppercase mt-1">Player: ${r.playerName}</p>${sb}</div>`;
                }
            });

            // SUPPORT & BANNERS
            onSnapshot(query(collection(db, "support_messages"), where("uid", "==", currentUser.uid)), s => {
                const l = document.getElementById('support-history'); l.innerHTML = '';
                s.forEach(d => { const m = d.data(); l.innerHTML += `<div class="bg-gray-50 p-4 rounded-2xl border border-gray-100"><p class="text-xs font-bold text-gray-800">Me: ${m.message}</p>${m.adminReply ? `<p class="text-xs text-red-600 font-bold mt-2 italic">Admin: ${m.adminReply}</p>` : ''}</div>`; });
            });
            onSnapshot(collection(db, "banners"), s => { const l = document.getElementById('banner-slider'); l.innerHTML = ''; s.forEach(d => l.innerHTML += `<img src="${d.data().img}" class="banner-slide">`); let i=0; setInterval(() => { i++; if(i>=s.size) i=0; l.style.transform=`translateX(-${i*100}%)`; }, 4500); });
        }

        // --- ACTIONS ---
        window.openJoinModal = (id, fee) => { document.getElementById('join-match-id').value = id; document.getElementById('join-match-fee').value = fee; document.getElementById('pay-fee').innerText = fee; openModal('modal-join'); };
        document.getElementById('join-form').onsubmit = async (e) => {
            e.preventDefault(); const fid = document.getElementById('join-match-id').value;
            await addDoc(collection(db, "registrations"), { uid: currentUser.uid, matchID: fid, playerName: document.getElementById('join-pname').value, gameID: document.getElementById('join-puid').value, trxID: document.getElementById('join-ptrx').value, fee: document.getElementById('pay-fee').innerText, status: 'pending', timestamp: new Date().getTime() });
            alert("Join Request Sent!"); closeModal('modal-join');
        };
        document.getElementById('btn-pay-wallet').onclick = async () => {
            const fee = Number(document.getElementById('join-match-fee').value);
            if(userData.balance < fee) return alert("Low wallet balance!");
            const n = prompt("Nickname:"); const u = prompt("UID:"); if(!n || !u) return;
            await addDoc(collection(db, "registrations"), { uid: currentUser.uid, matchID: document.getElementById('join-match-id').value, playerName: n, gameID: u, trxID: "WALLET_PAY", fee: fee, status: 'approved', timestamp: new Date().getTime() });
            await updateDoc(doc(db, "users", currentUser.uid), { balance: userData.balance - fee });
            alert("Success!"); closeModal('modal-join');
        };
        document.getElementById('money-form').onsubmit = async (e) => { e.preventDefault(); await addDoc(collection(db, "wallet_requests"), { uid: currentUser.uid, email: currentUser.email, amount: document.getElementById('money-amt').value, trxID: document.getElementById('money-trx').value, type: 'deposit', status: 'pending', timestamp: new Date().getTime() }); alert("Sent!"); closeModal('modal-add-money'); };
        document.getElementById('wit-form').onsubmit = async (e) => { e.preventDefault(); const amt = Number(document.getElementById('wit-amt').value); if(amt > userData.balance) return alert("Low balance!"); await addDoc(collection(db, "wallet_requests"), { uid: currentUser.uid, email: currentUser.email, amount: amt, number: document.getElementById('wit-num').value, type: 'withdraw', status: 'pending', timestamp: new Date().getTime() }); await updateDoc(doc(db, "users", currentUser.uid), { balance: userData.balance - amt }); alert("Sent!"); closeModal('modal-withdraw'); };
        window.sendSupportMsg = async () => { const m = document.getElementById('support-msg').value; if(m) { await addDoc(collection(db, "support_messages"), { uid: currentUser.uid, email: currentUser.email, message: m, adminReply: "", timestamp: new Date().getTime() }); document.getElementById('support-msg').value = ''; alert("Sent!"); } };
        
        window.handleAuth = async (e) => { e.preventDefault(); const em = document.getElementById('auth-email').value; const ps = document.getElementById('auth-pass').value; const isL = document.getElementById('auth-btn').innerText === 'লগ ইন'; try { if(isL) await signInWithEmailAndPassword(auth, em, ps); else { const res = await createUserWithEmailAndPassword(auth, em, ps); await setDoc(doc(db, "users", res.user.uid), { email: em, balance: 0, createdAt: new Date() }); } } catch (err) { alert(err.message); } };
        window.toggleAuth = () => { const b = document.getElementById('auth-btn'); b.innerText = b.innerText === 'লগ ইন' ? 'সাইন আপ' : 'লগ ইন'; };
        window.switchPage = (id) => { document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active-tab')); document.getElementById('tab-'+id).classList.add('active-tab'); document.querySelectorAll('.nav-icon').forEach(n => n.classList.replace('text-red-600', 'text-gray-300')); document.getElementById('nav-'+id).classList.replace('text-gray-300', 'text-red-600'); };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.logoutUser = () => signOut(auth);
    </script>
</body>
</html>
